<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цахим Шалгалт</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e17;
            --surface: #1a1828;
            --surface2: #232135;
            --accent: #ff6b35;
            --accent2: #a259ff;
            --success: #2dd36f;
            --danger: #ff4961;
            --text: #fffffe;
            --text-muted: #a7a9be;
            --border: rgba(255,255,255,0.08);
            --radius: 16px;
            --timer-full: #2dd36f;
            --timer-mid: #ffd166;
            --timer-low: #ff4961;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
                align-items: flex-start;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
                overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 80% 10%, rgba(162,89,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 20% 90%, rgba(255,107,53,0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .app-wrapper {
            width: 100%;
            max-width: 680px;
            position: relative;
            z-index: 1;
        }

        /* ========== EDITOR PANEL ========== */
        #editor-panel {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .editor-header {
            background: var(--surface2);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .editor-header h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .editor-header h1 span { color: var(--accent); }

        .badge {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            background: rgba(255,107,53,0.15);
            color: var(--accent);
            border: 1px solid rgba(255,107,53,0.3);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .editor-body { padding: 24px 28px; }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
                max-height: min(72vh, 560px);
            overflow-y: auto;
            padding-right: 6px;
        }

        .questions-list::-webkit-scrollbar { width: 8px; }
        .questions-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .questions-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .questions-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.32); }

        .q-item {
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .q-item:hover { border-color: rgba(255,255,255,0.15); }

        .q-item-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            user-select: none;
        }

        .q-num {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            background: rgba(255,107,53,0.1);
            border-radius: 6px;
            padding: 3px 8px;
            min-width: 36px;
            text-align: center;
        }

        .q-preview {
            flex: 1;
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .q-preview.has-text { color: var(--text); }

        .q-actions { display: flex; gap: 6px; }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
        }

        .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .icon-btn.delete:hover { color: var(--danger); background: rgba(255,73,97,0.1); }

        .q-expand {
            border-top: 1px solid var(--border);
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .q-expand.open { display: flex; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }

        .form-input, .form-textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            transition: border-color 0.2s;
            width: 100%;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .answer-row {
            display: flex;
                align-items: flex-start;
            gap: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 10px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .answer-row.correct-answer { border-color: var(--success); background: rgba(45,211,111,0.06); }

        .answer-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .answer-row.correct-answer .answer-check {
            background: var(--success);
            border-color: var(--success);
        }

        .answer-check svg { display: none; }
        .answer-row.correct-answer .answer-check svg { display: block; }

        .answer-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            outline: none;
              width: 100%;
              min-height: 44px;
              line-height: 1.45;
              resize: vertical;
              overflow-wrap: anywhere;
              white-space: pre-wrap;
              padding-top: 1px;
        }

        .answer-input::placeholder { color: var(--text-muted); }

        .add-q-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,107,53,0.08);
            border: 1px dashed rgba(255,107,53,0.3);
            border-radius: 12px;
            color: var(--accent);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-q-btn:hover { background: rgba(255,107,53,0.14); border-color: var(--accent); }

        .start-btn {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(255,107,53,0.35);
        }

        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255,107,53,0.45); }
        .start-btn:active { transform: translateY(0); }
        .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ========== QUIZ PANEL ========== */
        #quiz-panel {
            display: none;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .quiz-top {
            padding: 20px 28px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .progress-wrap { flex: 1; }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff8c5a);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        /* Timer */
        .timer-circle {
            width: 54px;
            height: 54px;
            position: relative;
            flex-shrink: 0;
        }

        .timer-circle svg { transform: rotate(-90deg); }

        .timer-circle circle.track {
            fill: none;
            stroke: var(--bg);
            stroke-width: 4;
        }

        .timer-circle circle.fill {
            fill: none;
            stroke: var(--success);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .timer-num {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
        }

        .quiz-body { padding: 28px; }

        #question-text {
            font-size: 20px;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        #image-container { margin-bottom: 16px; }

        #image-container img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .ans-btn {
            padding: 16px 14px;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
                align-items: flex-start;
            gap: 10px;
                white-space: normal;
                overflow-wrap: anywhere;
                line-height: 1.45;
        }

        .ans-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(255,107,53,0.08); }

        .ans-btn .btn-letter {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--bg);
            border-radius: 6px;
            padding: 2px 7px;
            flex-shrink: 0;
        }

        .ans-btn .btn-text {
            flex: 1;
            min-width: 0;
        }

        .ans-btn.correct { background: rgba(45,211,111,0.12); border-color: var(--success); color: var(--success); }
        .ans-btn.correct .btn-letter { background: var(--success); color: white; }
        .ans-btn.wrong { background: rgba(255,73,97,0.1); border-color: var(--danger); color: var(--danger); }
        .ans-btn.wrong .btn-letter { background: var(--danger); color: white; }
        .ans-btn.timeout { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.05); color: var(--text-muted); }
        .ans-btn:disabled { cursor: default; }

        /* Explanation */
        .explanation-box {
            margin-top: 18px;
            padding: 16px;
            background: rgba(162,89,255,0.08);
            border: 1px solid rgba(162,89,255,0.2);
            border-radius: 12px;
            display: none;
        }

        .explanation-box.show { display: block; }

        .explanation-box .exp-label {
            font-size: 10px;
            font-weight: 900;
            color: var(--accent2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .explanation-box p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .next-btn {
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            display: none;
            transition: all 0.2s;
            box-shadow: 0 6px 18px rgba(255,107,53,0.3);
        }

        .next-btn.show { display: block; }
        .next-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(255,107,53,0.4); }

        /* ========== RESULT PANEL ========== */
        #result-panel {
            display: none;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .result-icon { font-size: 56px; margin-bottom: 12px; }

        .result-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .result-score {
            font-family: 'Space Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            margin: 16px 0;
        }

        .result-feedback { font-size: 16px; color: var(--text-muted); margin-bottom: 32px; }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            min-width: 90px;
        }

        .stat-val { font-size: 22px; font-weight: 900; }
        .stat-val.good { color: var(--success); }
        .stat-val.bad { color: var(--danger); }
        .stat-val.skip { color: var(--text-muted); }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 700; text-transform: uppercase; }

        .restart-btn {
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 18px rgba(255,107,53,0.3);
        }

        .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255,107,53,0.4); }

        .hide { display: none !important; }

        @media (max-width: 480px) {
            .btn-grid, .answers-grid { grid-template-columns: 1fr; }
            .quiz-body { padding: 20px; }
            .editor-body { padding: 16px 18px; }
              .questions-list { max-height: min(68vh, 520px); }
        }

        /* ========== REGISTRATION MODAL ========== */
        #reg-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        #reg-modal.show { display: flex; }
        .reg-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            margin: 16px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.7);
        }
        .reg-card h2 { font-size: 22px; font-weight: 900; margin-bottom: 6px; letter-spacing: -0.3px; }
        .reg-card h2 span { color: var(--accent); }
        .reg-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
        .reg-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .reg-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
        .reg-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            padding: 12px 16px;
            transition: border-color 0.2s;
        }
        .reg-input:focus { outline: none; border-color: var(--accent); }
        .reg-input::placeholder { color: var(--text-muted); opacity: 0.6; }
        .reg-btn {
            width: 100%;
            margin-top: 8px;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 18px rgba(255,107,53,0.35);
        }
        .reg-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(255,107,53,0.45); }

        /* ========== HISTORY PANEL ========== */
        #history-panel {
            display: none;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .hist-header {
            background: var(--surface2);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .hist-header h2 { font-size: 20px; font-weight: 900; margin: 0; }
        .hist-header h2 span { color: var(--accent2); }
        .hist-body { padding: 24px 28px; }
        .hist-table { width: 100%; border-collapse: collapse; }
        .hist-table th {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .hist-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
        .hist-table tr:last-child td { border-bottom: none; }
        .hist-table tr:hover td { background: rgba(255,255,255,0.02); }
        .hist-score { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
        .hist-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .hist-badge.pass { background: rgba(45,211,111,0.15); color: var(--success); }
        .hist-badge.fail { background: rgba(255,73,97,0.12); color: var(--danger); }
        .hist-empty { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 15px; }
        .hist-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .hist-back-btn {
            padding: 12px 28px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .hist-back-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
        .hist-clear-btn {
            padding: 12px 28px;
            background: rgba(255,73,97,0.1);
            border: 1px solid rgba(255,73,97,0.3);
            border-radius: 10px;
            color: var(--danger);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .hist-clear-btn:hover { background: rgba(255,73,97,0.2); }

        /* ========== AUTOSAVE TOAST ========== */
        #autosave-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid rgba(45,211,111,0.35);
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 200;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
        }
        #autosave-toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- EDITOR PANEL -->
    <div id="editor-panel">
        <div class="editor-header">
            <h1>Шалгалт <span>Бүтээгч</span></h1>
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="showHistory()" style="background:rgba(162,89,255,0.15); border:1px solid rgba(162,89,255,0.3); border-radius:20px; color:var(--accent2); font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; padding:6px 14px; cursor:pointer;">📋 Түүх</button>
                <span class="badge">EDITOR</span>
            </div>
        </div>
        <div class="editor-body">
            <div class="questions-list" id="questions-list"></div>
            <button class="add-q-btn" onclick="addQuestion()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Асуулт нэмэх
            </button>
            <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>
                ▶ Шалгалт эхлүүлэх
            </button>
        </div>
    </div>

    <!-- QUIZ PANEL -->
    <div id="quiz-panel">
        <div class="quiz-top">
            <div class="progress-wrap">
                <div class="progress-meta">
                    <span id="q-counter">Асуулт 1 / 5</span>
                    <span id="score-badge">⭐ 0</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
            </div>
            <div class="timer-circle" id="timer-wrap">
                <svg viewBox="0 0 54 54" width="54" height="54">
                    <circle class="track" cx="27" cy="27" r="23"/>
                    <circle class="fill" id="timer-ring" cx="27" cy="27" r="23" stroke-dasharray="144.5" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-num" id="timer-num">60</div>
            </div>
        </div>
        <div class="quiz-body">
            <div id="question-text"></div>
            <div id="image-container"></div>
            <div id="answer-buttons" class="btn-grid"></div>
            <div class="explanation-box" id="explanation-box">
                <div class="exp-label">💡 Тайлбар</div>
                <p id="explanation-text"></p>
            </div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Дараагийнх →</button>
        </div>
    </div>

    <!-- RESULT PANEL -->
    <div id="result-panel">
        <div class="result-icon" id="result-icon">🏆</div>
        <div class="result-title" id="result-title">Дүн гарлаа!</div>
        <div class="result-score" id="result-score">0%</div>
        <div class="result-feedback" id="result-feedback"></div>
        <div id="result-user-info" style="display:none; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px 20px; margin-bottom:24px; text-align:left;">
            <div style="display:flex; gap:28px; flex-wrap:wrap;">
                <div><div style="font-size:11px; color:var(--text-muted); font-weight:800; text-transform:uppercase; letter-spacing:0.8px;">Нэр</div><div id="result-user-name" style="font-size:16px; font-weight:800; margin-top:3px;"></div></div>
                <div><div style="font-size:11px; color:var(--text-muted); font-weight:800; text-transform:uppercase; letter-spacing:0.8px;">Албан тушаал</div><div id="result-user-pos" style="font-size:15px; font-weight:700; margin-top:3px; color:var(--accent2);"></div></div>
            </div>
        </div>
        <div class="result-stats">
            <div class="stat-box"><div class="stat-val good" id="stat-correct">0</div><div class="stat-label">Зөв</div></div>
            <div class="stat-box"><div class="stat-val bad" id="stat-wrong">0</div><div class="stat-label">Буруу</div></div>
            <div class="stat-box"><div class="stat-val skip" id="stat-skip">0</div><div class="stat-label">Алгасав</div></div>
        </div>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
            <button class="restart-btn" onclick="backToEditor()">← Буцах</button>
            <button class="restart-btn" style="background:linear-gradient(135deg,var(--accent2),#c47eff); box-shadow:0 6px 18px rgba(162,89,255,0.3);" onclick="showHistory()">📋 Түүх харах</button>
        </div>
    </div>

    <!-- AUTOSAVE TOAST -->
    <div id="autosave-toast">💾 Автоматаар хадгалагдлаа</div>

    <!-- REGISTRATION MODAL -->
    <div id="reg-modal">
        <div class="reg-card">
            <h2>Шалгалтанд <span>Бүртгүүлэх</span></h2>
            <p class="reg-subtitle">Шалгалт эхлэхийн өмнө мэдээллээ оруулна уу.</p>
            <div class="reg-field">
                <label class="reg-label">Овог Нэр</label>
                <input class="reg-input" id="reg-name" placeholder="Жишээ: Б.Батбаяр" type="text">
            </div>
            <div class="reg-field">
                <label class="reg-label">Албан тушаал</label>
                <input class="reg-input" id="reg-position" placeholder="Жишээ: Замын техникч" type="text">
            </div>
            <button class="reg-btn" onclick="confirmRegistration()">✓ Бүртгүүлж шалгалт өгөх</button>
        </div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="history-panel">
        <div class="hist-header">
            <h2>Шалгалтын <span>Түүх</span></h2>
            <span class="badge" style="background:rgba(162,89,255,0.15);color:var(--accent2);border-color:rgba(162,89,255,0.3);">HISTORY</span>
        </div>
        <div class="hist-body">
            <div id="history-table-wrapper"></div>
            <div class="hist-actions">
                <button class="hist-back-btn" onclick="backFromHistory()">← Буцах</button>
                <button class="hist-clear-btn" onclick="clearHistory()">🗑 Бүртгэл устгах</button>
            </div>
        </div>
    </div>
</div>

<script>
const LETTERS = ['A', 'B', 'C', 'D'];
const TIMER_DURATION = 60;
const CIRCUMFERENCE = 144.5;

let questions = [];
let currentIndex = 0;
let score = 0;
let wrongCount = 0;
let skipCount = 0;
let timerInterval = null;
let timeLeft = TIMER_DURATION;
let currentUser = { name: '', position: '' };
let _toastTimer = null;
let activeQuestions = [];

// ========================
//  AUTOSAVE
// ========================
function saveQuestions() {
    localStorage.setItem('quiz_questions_v1', JSON.stringify(questions));
    const toast = document.getElementById('autosave-toast');
    toast.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function loadSavedQuestions() {
    const saved = localStorage.getItem('quiz_questions_v1');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
                return parsed.map(normalizeQuestion);
            }
        } catch(e) {}
    }
    return null;
}

// ========================
//  EDITOR
// ========================
function createQuestion() {
    return {
        id: Date.now() + Math.random(),
        question: '',
        image: null,
        explanation: '',
        answers: [
            { text: '', correct: true },
            { text: '', correct: false },
            { text: '', correct: false },
            { text: '', correct: false }
        ]
    };
}

function normalizeQuestion(raw) {
    const base = createQuestion();
    const src = raw || {};
    const normalizedAnswers = Array.isArray(src.answers)
        ? src.answers.slice(0, 4).map((a, idx) => ({
            text: String((a && a.text) || ''),
            correct: !!(a && a.correct)
        }))
        : base.answers;

    while (normalizedAnswers.length < 4) {
        normalizedAnswers.push({ text: '', correct: false });
    }

    if (!normalizedAnswers.some(a => a.correct)) {
        normalizedAnswers[0].correct = true;
    }

    return {
        id: typeof src.id === 'number' ? src.id : Date.now() + Math.random(),
        question: String(src.question || ''),
        image: typeof src.image === 'string' ? src.image : null,
        explanation: String(src.explanation || ''),
        answers: normalizedAnswers
    };
}

function isQuestionReady(q) {
    if (!String(q.question || '').trim()) return false;
    if (!Array.isArray(q.answers) || q.answers.length === 0) return false;

    const filledAnswers = q.answers.filter(a => String((a && a.text) || '').trim());
    if (filledAnswers.length < 2) return false;

    return filledAnswers.some(a => !!a.correct);
}

function addQuestion(data) {
    const q = data || createQuestion();
    questions.push(q);
    renderEditor();
    saveQuestions();
}

function removeQuestion(id) {
    questions = questions.filter(q => q.id !== id);
    renderEditor();
    saveQuestions();
}

function revealExpandedQuestion(id) {
    const expandEl = document.getElementById('expand-' + id);
    if (!expandEl) return;

    requestAnimationFrame(() => {
        expandEl.closest('.q-item')?.scrollIntoView({
            behavior: 'smooth',
            block: 'nearest'
        });
    });
}

function toggleExpand(id) {
    const el = document.getElementById('expand-' + id);
    el.classList.toggle('open');
    if (el.classList.contains('open')) revealExpandedQuestion(id);
}

function setCorrect(qId, idx) {
    const q = questions.find(q => q.id === qId);
    q.answers.forEach((a, i) => a.correct = i === idx);
    renderEditor();
    saveQuestions();
    // re-open the expanded section
    const el = document.getElementById('expand-' + qId);
    if (el) {
        el.classList.add('open');
        revealExpandedQuestion(qId);
    }
}

function syncQuestion(id) {
    const q = questions.find(q => q.id === id);
    const qEl = document.getElementById('qinput-' + id);
    const expEl = document.getElementById('expinput-' + id);
    if (qEl) q.question = qEl.value;
    if (expEl) q.explanation = expEl.value;
    q.answers.forEach((a, i) => {
        const aEl = document.getElementById('ans-' + id + '-' + i);
        if (aEl) a.text = aEl.value;
    });
    updateStartBtn();
    saveQuestions();
    // update preview
    const preview = document.getElementById('preview-' + id);
    if (preview) {
        preview.textContent = q.question || 'Асуултаа оруулна уу...';
        preview.className = 'q-preview' + (q.question ? ' has-text' : '');
    }
}

function uploadImage(id, input) {
    const q = questions.find(x => x.id === id);
    if (!q || !input.files || !input.files[0]) return;
    const file = input.files[0];
    if (!file.type.startsWith('image/')) {
        alert('Зөвхөн зураг файл сонгоно уу!');
        input.value = '';
        return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
        q.image = e.target.result;
        saveQuestions();
        renderEditor();
        const el = document.getElementById('expand-' + id);
        if (el) el.classList.add('open');
    };
    reader.readAsDataURL(file);
}

function renderEditor() {
    const list = document.getElementById('questions-list');
    list.innerHTML = '';
    questions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerHTML = `
        <div class="q-item-header" onclick="toggleExpand(${q.id})">
            <span class="q-num">Q${idx + 1}</span>
            <span class="q-preview ${q.question ? 'has-text' : ''}" id="preview-${q.id}">${q.question || 'Асуултаа оруулна уу...'}</span>
            <div class="q-actions">
                <button class="icon-btn delete" onclick="event.stopPropagation(); removeQuestion(${q.id})" title="Устгах">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                </button>
            </div>
        </div>
        <div class="q-expand ${q._open ? 'open' : ''}" id="expand-${q.id}">
            <div class="form-group">
                <label class="form-label">Асуулт</label>
                <textarea class="form-textarea" id="qinput-${q.id}" placeholder="Асуулт бичнэ үү..." oninput="syncQuestion(${q.id})">${q.question}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Зураг файл</label>
                <input class="form-input" type="file" accept="image/*" onchange="uploadImage(${q.id}, this)" style="margin-top:8px; padding:8px;">
                ${q.image ? `<div style="margin-top:8px;"><img src="${q.image}" alt="preview" style="max-width:100%; max-height:120px; border-radius:10px; border:1px solid var(--border);"></div>` : ''}
            </div>
            <div class="form-group">
                <label class="form-label">Хариултууд — зөв хариултыг сонгоно уу</label>
                <div class="answers-grid">
                ${q.answers.map((a, i) => `
                    <div class="answer-row ${a.correct ? 'correct-answer' : ''}" id="arow-${q.id}-${i}" onclick="setCorrect(${q.id}, ${i})">
                        <div class="answer-check">
                            <svg width="10" height="10" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <textarea class="answer-input" id="ans-${q.id}-${i}" placeholder="${LETTERS[i]} хариулт" rows="2" onclick="event.stopPropagation()" oninput="syncQuestion(${q.id})">${a.text}</textarea>
                    </div>
                `).join('')}
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Зөв хариултын тайлбар</label>
                <textarea class="form-textarea" id="expinput-${q.id}" placeholder="Хариулт яагаад зөв болохыг тайлбарлана уу..." oninput="syncQuestion(${q.id})">${q.explanation}</textarea>
            </div>
        </div>`;
        list.appendChild(div);
    });
    updateStartBtn();
}

function updateStartBtn() {
    const btn = document.getElementById('start-btn');
    const validCount = questions.filter(isQuestionReady).length;
    btn.disabled = validCount === 0;
}

// ========================
//  QUIZ
// ========================
function startQuiz() {
    activeQuestions = questions.filter(isQuestionReady);
    if (activeQuestions.length === 0) {
        alert('Эхлүүлэхийн тулд дор хаяж 1 бүрэн асуулт оруулна уу!');
        return;
    }
    document.getElementById('reg-name').value = '';
    document.getElementById('reg-position').value = '';
    document.getElementById('reg-modal').classList.add('show');
}

function confirmRegistration() {
    const name = document.getElementById('reg-name').value.trim();
    const position = document.getElementById('reg-position').value.trim();
    if (!name) { alert('Нэрээ оруулна уу!'); return; }
    if (!position) { alert('Албан тушаалаа оруулна уу!'); return; }
    currentUser = { name, position };
    document.getElementById('reg-modal').classList.remove('show');

    currentIndex = 0;
    score = 0;
    wrongCount = 0;
    skipCount = 0;

    document.getElementById('editor-panel').style.display = 'none';
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('quiz-panel').style.display = 'block';
    showQuestion();
}

function shuffleAnswers(answers) {
    const shuffled = [...answers];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function showQuestion() {
    const q = activeQuestions[currentIndex];

    // progress
    const pct = (currentIndex / activeQuestions.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('q-counter').textContent = `Асуулт ${currentIndex + 1} / ${activeQuestions.length}`;
    document.getElementById('score-badge').textContent = `⭐ ${score}`;

    // question
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('image-container').innerHTML = q.image
        ? `<img src="${q.image}" alt="">`
        : '';

    // answers
    const grid = document.getElementById('answer-buttons');
    grid.innerHTML = '';
    const readyAnswers = q.answers.filter(a => String((a && a.text) || '').trim());
    const randomizedAnswers = shuffleAnswers(readyAnswers);
    randomizedAnswers.forEach((a, i) => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.innerHTML = `<span class="btn-letter">${LETTERS[i]}</span><span class="btn-text"></span>`;
        btn.querySelector('.btn-text').textContent = a.text;
        if (a.correct) btn.dataset.correct = 'true';
        btn.addEventListener('click', () => selectAnswer(btn));
        grid.appendChild(btn);
    });

    // explanation hidden
    const expBox = document.getElementById('explanation-box');
    expBox.classList.remove('show');
    document.getElementById('next-btn').classList.remove('show');

    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = TIMER_DURATION;
    updateTimerUI();

    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timeExpired();
        }
    }, 1000);
}

function updateTimerUI() {
    const ring = document.getElementById('timer-ring');
    const num = document.getElementById('timer-num');
    const ratio = timeLeft / TIMER_DURATION;
    const offset = CIRCUMFERENCE * (1 - ratio);
    ring.style.strokeDashoffset = offset;
    num.textContent = timeLeft;

    if (ratio > 0.5) ring.style.stroke = 'var(--timer-full)';
    else if (ratio > 0.25) ring.style.stroke = 'var(--timer-mid)';
    else ring.style.stroke = 'var(--timer-low)';

    num.style.color = ratio > 0.25 ? 'var(--text)' : 'var(--timer-low)';
}

function timeExpired() {
    skipCount++;
    const btns = document.querySelectorAll('.ans-btn');
    btns.forEach(btn => {
        btn.disabled = true;
        btn.classList.add('timeout');
        if (btn.dataset.correct === 'true') btn.classList.add('correct');
    });
    showExplanation();
}

function selectAnswer(btn) {
    clearInterval(timerInterval);

    const correct = btn.dataset.correct === 'true';
    const grid = document.getElementById('answer-buttons');

    Array.from(grid.children).forEach(b => {
        b.disabled = true;
        if (b.dataset.correct === 'true') b.classList.add('correct');
    });

    if (correct) {
        score++;
    } else {
        btn.classList.add('wrong');
        wrongCount++;
    }

    document.getElementById('score-badge').textContent = `⭐ ${score}`;
    showExplanation();
}

function showExplanation() {
    const q = activeQuestions[currentIndex];
    const expBox = document.getElementById('explanation-box');
    if (q.explanation) {
        document.getElementById('explanation-text').textContent = q.explanation;
        expBox.classList.add('show');
    }
    document.getElementById('next-btn').classList.add('show');
    document.getElementById('next-btn').textContent =
        currentIndex < activeQuestions.length - 1 ? 'Дараагийнх →' : 'Дүн харах';
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < activeQuestions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    clearInterval(timerInterval);
    document.getElementById('quiz-panel').style.display = 'none';
    document.getElementById('result-panel').style.display = 'block';

    const total = activeQuestions.length;
    const pct = Math.round((score / total) * 100);

    document.getElementById('result-score').textContent = pct + '%';
    document.getElementById('stat-correct').textContent = score;
    document.getElementById('stat-wrong').textContent = wrongCount;
    document.getElementById('stat-skip').textContent = skipCount;

    let icon, title, feedback;
    if (pct >= 90) { icon = '🏆'; title = 'Гайхалтай!'; feedback = 'Та маш сайн хийлээ!'; }
    else if (pct >= 70) { icon = '🎉'; title = 'Баяр хүргэе!'; feedback = 'Та тэнцлээ. Цааш үргэлжлүүлэн суралц!'; }
    else if (pct >= 50) { icon = '📚'; title = 'Дунд зэрэг'; feedback = 'Арай дутав. Дахин оролдоно уу!'; }
    else { icon = '💪'; title = 'Уналаа'; feedback = 'Сайн суралцаарай, дахин оролдоно уу!'; }

    document.getElementById('result-icon').textContent = icon;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-feedback').textContent = feedback;

    // Хэрэглэгчийн мэдээлэл харуулах
    const infoBox = document.getElementById('result-user-info');
    if (currentUser.name) {
        document.getElementById('result-user-name').textContent = currentUser.name;
        document.getElementById('result-user-pos').textContent = currentUser.position;
        infoBox.style.display = 'block';
    } else {
        infoBox.style.display = 'none';
    }

    // Түүхэнд хадгалах
    saveQuizResult(pct);
}

function backToEditor() {
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('editor-panel').style.display = 'block';
}

// ========================
//  HISTORY
// ========================
function saveQuizResult(pct) {
    const history = JSON.parse(localStorage.getItem('quiz_history_v1')) || [];
    history.unshift({
        id: Date.now(),
        name: currentUser.name,
        position: currentUser.position,
        score: pct,
        correct: score,
        wrong: wrongCount,
        skip: skipCount,
        total: activeQuestions.length,
        date: new Date().toLocaleString('mn-MN')
    });
    localStorage.setItem('quiz_history_v1', JSON.stringify(history));
}

function renderHistory() {
    const history = JSON.parse(localStorage.getItem('quiz_history_v1')) || [];
    const wrapper = document.getElementById('history-table-wrapper');
    if (history.length === 0) {
        wrapper.innerHTML = '<div class="hist-empty">📭 Одоогоор бүртгэл байхгүй байна.</div>';
        return;
    }
    wrapper.innerHTML = `
        <div style="overflow-x:auto;">
        <table class="hist-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Огноо / Цаг</th>
                    <th>Нэр</th>
                    <th>Албан тушаал</th>
                    <th>Дүн</th>
                    <th>Зөв / Буруу / Алгасав</th>
                    <th>Үнэлгээ</th>
                </tr>
            </thead>
            <tbody>
                ${history.map((h, i) => `
                <tr>
                    <td style="color:var(--text-muted);font-size:12px;font-family:'Space Mono',monospace;">${i + 1}</td>
                    <td style="color:var(--text-muted);font-size:12px;white-space:nowrap;">${h.date}</td>
                    <td style="font-weight:800;">${h.name}</td>
                    <td style="color:var(--accent2);font-weight:600;">${h.position}</td>
                    <td><span class="hist-score" style="color:${h.score >= 70 ? 'var(--success)' : 'var(--danger)'}">${h.score}%</span></td>
                    <td style="font-size:13px;"><span style="color:var(--success);">${h.correct}✓</span> / <span style="color:var(--danger);">${h.wrong}✗</span> / <span style="color:var(--text-muted);">${h.skip}–</span></td>
                    <td><span class="hist-badge ${h.score >= 70 ? 'pass' : 'fail'}">${h.score >= 70 ? 'Тэнцсэн' : 'Тэнцээгүй'}</span></td>
                </tr>`).join('')}
            </tbody>
        </table>
        </div>`;
}

function showHistory() {
    renderHistory();
    document.getElementById('editor-panel').style.display = 'none';
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('quiz-panel').style.display = 'none';
    document.getElementById('history-panel').style.display = 'block';
}

function backFromHistory() {
    document.getElementById('history-panel').style.display = 'none';
    document.getElementById('editor-panel').style.display = 'block';
}

function clearHistory() {
    if (confirm('Бүх бүртгэлийг устгах уу?')) {
        localStorage.removeItem('quiz_history_v1');
        renderHistory();
    }
}

// Pre-load sample questions
const samples = [
    {
        id: 1,
        question: 'Монгол улсын нийслэл аль хот вэ?',
        image: null,
        explanation: 'Улаанбаатар хот нь 1639 онд үүсгэн байгуулагдсан Монгол улсын нийслэл юм.',
