<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Суман шилжүүлэг</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 12px; overflow-x: hidden; }
        .container { width: min(calc(100vw - 24px), 920px); max-width: 100%; margin: auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .search-box input[type="text"] { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 60%; font-size: 16px; }
        .new-id-input { width: 140px; }
        .table-input { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; width: 100%; font-size: 15px; font-family: inherit; display: none; }
        .search-hints { max-width: 420px; margin: 0 auto 20px; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; box-shadow: 0 10px 20px rgba(15,23,42,0.08); overflow: hidden; }
        .search-hints .hint-item { padding: 8px 12px; border-bottom: 1px solid #eef2f7; cursor: pointer; color: #1d4ed8; font-weight: 600; font-size: 14px; }
        .search-hints .hint-item:last-child { border-bottom: none; }
        .search-hints .hint-item:hover { background: #eef2ff; }
        .search-hints .hint-empty { padding: 10px; color: #64748b; font-size: 13px; text-align: center; }
        button { padding: 12px 25px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #2980b9; }

        #result { display: none; margin-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #7f8c8d; width: 40%; }
        td { color: #2c3e50; font-weight: 500; }
        .highlight { color: #e67e22; font-weight: bold; }
        .actions-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }
        .actions-row button.small { padding: 10px 18px; font-size: 14px; }
        .detail-layout { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 20px; }
        .detail-error { flex: 1 1 440px; min-width: 0; border: 2px dashed #f87171; border-radius: 16px; background: #fff5f5; padding: 32px; box-shadow: 0 25px 45px -20px rgba(248, 113, 113, 0.8); font-size: 1.4em; font-weight: 700; color: #b91c1c; text-align: left; display: none; }
        .detail-card { flex: 1 1 440px; min-width: 0; }
        .summary-table { flex: 0 0 320px; border-radius: 16px; border: 1px solid rgba(148,163,184,0.3); background: #fff; box-shadow: 0 20px 35px -15px rgba(15,23,42,0.35); overflow: hidden; }
        .summary-table table { border: none; width: 100%; }
        .summary-table th, .summary-table td { border: none; padding: 10px 12px; }
        .summary-table thead { background: #f1f5f9; font-weight: 700; color: #1e293b; }
        .summary-table td:first-child { font-weight: 700; color: #0f172a; }
        .summary-table td:nth-child(3) { text-align: right; }
        .summary-count { color: #1d4ed8; font-weight: 600; }
        .summary-empty { color: #64748b; text-align: center; }
        .summary-header { text-align: center; font-size: 1rem; font-weight: 700; letter-spacing:  text-transform: uppercase; color: #1e40af; padding: 12px 10px 0; }

        @media (max-width: 900px) {
            body { margin: 8px; }
            .container { width: min(calc(100vw - 16px), 920px); padding: 16px; }
            .search-box input[type="text"] { width: 100%; }
            .summary-table { flex: 1 1 100%; }
            .actions-row { justify-content: stretch; flex-wrap: wrap; }
            .actions-row button.small { flex: 1 1 100%; }
            th, td { word-break: break-word; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Суман шилжүүлгийн бүртгэл</h2>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Суман шилжүүлгийн дугаар оруулна уу (жишээ нь: 1)">
        <button onclick="searchItem()">Хайх</button>
        <input type="text" id="newRecordId" class="new-id-input" placeholder="Шинэ №">
        <button type="button" onclick="prepareNewRecord()">Шинэ бүртгэл</button>
    </div>
    <div id="searchHints" class="search-hints" style="display:none;"></div>

    <div class="detail-layout">
        <div id="detailError" class="detail-error">Мэдээлэл олдсонгүй!</div>
        <div id="result" class="detail-card">
        <h3 id="itemName" style="color: #3498db;"></h3>
        <table>
            <tr><th>Чиглэл</th><td><span id="td-direction"></span><select class="table-input" id="input-direction"></select></td></tr>
            <tr><th>Урт</th><td><span id="td-length"></span><input class="table-input" id="input-length"></td></tr>
            <tr><th>Тоонолжийн марк</th><td><span id="td-mark"></span><select class="table-input" id="input-mark"></select></td></tr>
            <tr><th>Маяг</th><td><span id="td-type"></span><select class="table-input" id="input-type"></select></td></tr>
            <tr><th>Зүрхэвчийг хийц</th><td><span id="td-structure"></span><select class="table-input" id="input-structure"></select></td></tr>
            <tr><th>Зам тавьсан он</th><td><span id="td-year"></span><input class="table-input" id="input-year"></td></tr>
            <tr><th>Замын төрөл</th><td><span id="td-trackType"></span><select class="table-input" id="input-trackType"></select></td></tr>
            <tr><th>Замын дугаар</th><td><span id="td-trackNumber"></span><input class="table-input" id="input-trackNumber"></td></tr>
                        <tr><th>Ашигтай урт</th><td><span id="td-utilizedLength"></span><input class="table-input" id="input-utilizedLength"></td></tr>
                        <tr><th>Зориулалт</th><td><span id="td-purpose"></span><select class="table-input" id="input-purpose"></select></td></tr>
                        <tr><th>Хэвгий</th><td><span id="td-inclination"></span><select class="table-input" id="input-inclination"></select></td></tr>
            <tr><th>Үе</th><td><span id="td-period"></span><input class="table-input" id="input-period"></td></tr>
            <tr><th>Тусгаарлах уулзвар</th><td><span id="td-junction"></span><input class="table-input" id="input-junction"></td></tr>
            <tr><th>Дүнз</th><td><span id="td-timber"></span><input class="table-input" id="input-timber"></td></tr>
            <tr><th>Дэр мод</th><td><span id="td-sleeper"></span><input class="table-input" id="input-sleeper"></td></tr>
            <tr><th>Балласт</th><td><span id="td-ballast" class="highlight"></span><select class="table-input" id="input-ballast"></select></td></tr>
        </table>
        <div id="editControls" class="actions-row" style="display:none;">
            <button id="startEditBtn" class="small" onclick="enterEditMode()">📋 Засах</button>
            <button id="saveEditBtn" class="small" style="display:none;" onclick="saveEdits()">✔ Хадгалах</button>
            <button id="cancelEditBtn" class="small" style="display:none;" onclick="cancelEdits()">✖ Болих</button>
        </div>
        </div>
        <div class="summary-table">
        <br> <br>
            <div class="summary-header">ХЭСГИЙН НИЙТ ҮЗҮҮЛЭЛТ</div>
            <table>
                <thead>
                    <tr><th></th><th>Ангилал</th><th>Нийт</th></tr>
                </thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>
    
</div>

<script>
    const STORAGE_KEY = 'sumInventory';
    const defaultInventory = {
        "1": {
            direction: "Зүүн",
            length: "6087",
            mark: "P-43",
            type: "1/11",
            structure: "Цутгамал",
            year: "1998",
            trackType: "Салбар зам",
            trackNumber: "А-21",
            utilizedLength: "6000",
            purpose: "Гүний болон кабелийн",
            inclination: "0‰",
            period: "15",
            junction: "1, 3",
            timber: "80",
            sleeper: "50",
            ballast: "Хайрга"
        }
    };
    let inventory = loadInventory();

    const fieldKeys = [
        'direction','length','mark','type','structure','year','trackType','trackNumber','utilizedLength','purpose','inclination','period','junction','timber','sleeper','ballast'
    ];
    const selectFieldOptions = {
        direction: ['Зүүн', 'Баруун'],
        mark: ['P-43', 'P-50', 'P-65'],
        type: ['1/11', '1/9'],
        structure: ['Цутгамал', 'Зүүмэл'],
        trackType: ['Салбар зам', 'Гол шугам'],
        ballast: ['Хайрга', 'Щебень'],
        purpose: ['Нүүрс', 'Шохой', 'Цемент', 'Бусад'],
        inclination: ['0‰', '5‰', '10‰', '15‰', '20‰', 'Бусад']
    };
    const summaryCategories = [
        { key: 'direction', label: 'Чиглэл' },
        { key: 'mark', label: 'Тоонолжийн марк' },
        { key: 'type', label: 'Маяг' },
        { key: 'structure', label: 'Зүрхэвчийн хийц' },
        { key: 'trackType', label: 'Замын төрөл' },
        { key: 'ballast', label: 'Балласт' }
    ];
    let currentId = null;
    let nextNumericId = 2;
    const numericIds = Object.keys(inventory)
        .map(id => parseInt(id, 10))
        .filter(value => !isNaN(value));
    if (numericIds.length > 0) {
        nextNumericId = Math.max(nextNumericId, Math.max(...numericIds) + 1);
    }
    let backupRecord = null;

    function loadInventory() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
        } catch (error) {
            console.warn('Unable to load inventory from storage', error);
        }
        return { ...defaultInventory };
    }

    function persistInventory() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        } catch (error) {
            console.warn('Unable to save inventory', error);
        }
    }

    function populateSelectOptions() {
        Object.entries(selectFieldOptions).forEach(([key, options]) => {
            const select = document.getElementById(`input-${key}`);
            if (!select) return;
            select.innerHTML = options.map(option => `<option value="${option}">${option || '... сонгох'}</option>`).join('');
        });
    }

    function ensureSelectOption(select, value) {
        if (!select || !value) return;
        const exists = Array.from(select.options).some(opt => opt.value === value);
        if (!exists) {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
        }
    }

    populateSelectOptions();

    function fillDisplayFields(data) {
        fieldKeys.forEach(key => {
            const span = document.getElementById(`td-${key}`);
            const input = document.getElementById(`input-${key}`);
            const value = data[key] || '';
            if (span) span.innerText = value;
            if (input) {
                if (selectFieldOptions[key]) {
                    ensureSelectOption(input, value);
                }
                input.value = value;
            }
        });
    }

    const searchInputEl = document.getElementById('searchInput');
    const searchHintsEl = document.getElementById('searchHints');
    const summaryBodyEl = document.getElementById('summaryBody');
    const detailErrorEl = document.getElementById('detailError');
    searchInputEl.addEventListener('input', () => {
        updateSearchHints(searchInputEl.value.trim());
    });

    function updateSearchHints(query) {
        searchHintsEl.innerHTML = '';
        if (!query) {
            searchHintsEl.style.display = 'none';
            return;
        }
        const matches = Object.entries(inventory)
            .filter(([id, data]) => {
                const idMatch = id.includes(query);
                const textMatch = Object.values(data)
                    .some(value => value && value.toString().toLowerCase().includes(query));
                return idMatch || textMatch;
            })
            .slice(0, 6);
        if (matches.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'hint-empty';
            empty.textContent = 'Хайлт илэрц олдсонгүй';
            searchHintsEl.appendChild(empty);
        } else {
            matches.forEach(([id, data]) => {
                const hint = document.createElement('div');
                hint.className = 'hint-item';
                hint.textContent = `#${id} · ${data.direction || data.mark || 'тодорхойгүй'} `;
                hint.addEventListener('click', () => {
                    searchInputEl.value = id;
                    updateSearchHints('');
                    searchItem();
                });
                searchHintsEl.appendChild(hint);
            });
        }
        searchHintsEl.style.display = 'block';
    }

    function getCounts(key) {
        const counts = {};
        Object.values(inventory).forEach(entry => {
            if (!entry) return;
            const value = entry[key];
            if (!value) return;
            counts[value] = (counts[value] || 0) + 1;
        });
        return counts;
    }

    function updateSummaryTable() {
        if (!summaryBodyEl) return;
        const rows = [];
        summaryCategories.forEach(category => {
            const counts = getCounts(category.key);
            const orderedValues = (selectFieldOptions[category.key] || []).concat(
                Object.keys(counts).filter(value => !(selectFieldOptions[category.key] || []).includes(value))
            ).filter(Boolean);
            if (orderedValues.length === 0) {
                rows.push(`<tr><td>${category.label}</td><td colspan="2" class="summary-empty">Мэдээлэл алга</td></tr>`);
                return;
            }
            orderedValues.forEach((value, index) => {
                const count = counts[value] || 0;
                const labelCell = index === 0 ? `<td>${category.label}</td>` : '<td></td>';
                rows.push(`<tr>${labelCell}<td>${value}</td><td><span class="summary-count">${count}</span></td></tr>`);
            });
        });
        summaryBodyEl.innerHTML = rows.join('');
    }

    function toggleEditMode(enable) {
        fieldKeys.forEach(key => {
            const span = document.getElementById(`td-${key}`);
            const input = document.getElementById(`input-${key}`);
            if (span) span.style.display = enable ? 'none' : '';
            if (input) input.style.display = enable ? 'block' : 'none';
        });
        document.getElementById('startEditBtn').style.display = enable ? 'none' : 'inline-flex';
        document.getElementById('saveEditBtn').style.display = enable ? 'inline-flex' : 'none';
        document.getElementById('cancelEditBtn').style.display = enable ? 'inline-flex' : 'none';
    }

    function prepareNewRecord() {
        const requested = document.getElementById('newRecordId').value.trim();
        const candidate = requested || String(nextNumericId);
        currentId = candidate;
        if (!inventory[currentId]) {
            inventory[currentId] = {};
        }
        document.getElementById('searchInput').value = currentId;
        document.getElementById('itemName').innerText = "Дугаар #" + currentId + " - Шинэ мэдээлэл";
        const parsed = parseInt(currentId, 10);
        if (!isNaN(parsed)) {
            nextNumericId = Math.max(nextNumericId, parsed + 1);
        }
        fillDisplayFields(inventory[currentId]);
        backupRecord = { ...inventory[currentId] };
        toggleEditMode(true);
        document.getElementById('result').style.display = 'block';
        if (detailErrorEl) {
            detailErrorEl.style.display = 'none';
        }
        document.getElementById('editControls').style.display = 'flex';
        updateSummaryTable();
    }

    function enterEditMode() {
        if (!currentId) return;
        backupRecord = { ...inventory[currentId] };
        toggleEditMode(true);
    }

    function searchItem() {
        const id = document.getElementById('searchInput').value;
        const resultDiv = document.getElementById('result');

        if (inventory[id]) {
            const data = inventory[id];
            document.getElementById('itemName').innerText = "Дугаар #" + id + " - Дэлгэрэнгүй мэдээлэл";
            currentId = id;
            fillDisplayFields(data);
            toggleEditMode(false);
            document.getElementById('editControls').style.display = 'flex';
            resultDiv.style.display = 'block';
            if (detailErrorEl) detailErrorEl.style.display = 'none';
            updateSearchHints('');
        } else {
            currentId = null;
            resultDiv.style.display = 'none';
            if (detailErrorEl) detailErrorEl.style.display = 'flex';
            document.getElementById('editControls').style.display = 'none';
            updateSearchHints('');
        }
    }

    function saveEdits() {
        if (!currentId) return;
        const updated = {};
        fieldKeys.forEach(key => {
            const input = document.getElementById(`input-${key}`);
            if (input) {
                updated[key] = input.value;
            }
        });
        inventory[currentId] = { ...inventory[currentId], ...updated };
        fillDisplayFields(inventory[currentId]);
        toggleEditMode(false);
        backupRecord = { ...inventory[currentId] };
        persistInventory();
        updateSummaryTable();
    }

    function cancelEdits() {
        if (!currentId) return;
        const baseline = backupRecord || {};
        inventory[currentId] = { ...baseline };
        fillDisplayFields(inventory[currentId]);
        toggleEditMode(false);
        document.getElementById('itemName').innerText = "Дугаар #" + currentId + " - Дэлгэрэнгүй мэдээлэл";
        updateSummaryTable();
    }

    updateSummaryTable();
</script>

</body>
</html>
