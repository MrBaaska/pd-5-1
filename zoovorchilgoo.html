<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ажлын заавар хуудас</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #e3f0fc;
            min-height: 100vh;
            padding: 8px;
            color: #fff;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(0, 1.15fr) minmax(280px, 0.85fr);
            grid-template-rows: auto 1fr auto; 
            gap: 16px;
            width: min(calc(100vw - 24px), 1760px);
            max-width: 100%;
            margin: 0 auto;
            background: #e3f0fc;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(67, 160, 71, 0.15);
            min-height: calc(100vh - 16px);
            height: auto;
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: #e3f0fc;
            padding: 30px;
            color: #fff;
            position: relative;
            overflow: visible;
            grid-column: 1 / -1;
            grid-row: 1;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .header h1 {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            font-size: 28px;
        }

        .header h1 {
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .header-form {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        .header-form > * {
            flex: 0 1 auto;
        }

        .header-form span {
            font-weight: 700;
            font-size: 16px;
            color: #222;
            text-shadow: none;
            background: #d0e7fa;
            padding: 10px 16px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .header-form span:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .header-form input, .header-form select {
            padding: 10px 15px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            background: rgba(255,255,255,0.98);
            font-size: 14px;
            font-weight: 600px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 100%;
            min-height: 44px;
        }

        .header-form input:focus, .header-form select:focus {
            outline: none;
            border-color: #f093fb;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 25px rgba(240, 147, 251, 0.4);
        }

        .header-form input:hover, .header-form select:hover {
            border-color: rgba(255,255,255,0.6);
            transform: scale(1.02);
        }

        .header-form input[type="number"] {
            width: 130px;
            text-align: center;
            font-weight: bold;
        }

        .header-form input[type="datetime-local"] {
            min-width: min(220px, 100%);
        }

        .header-form select {
            min-width: 180px;
        }

        #location1,
        #location2 {
            min-width: 180px;
        }

        #workType {
            width: 100%;
            min-width: 0;
            max-width: 100%;
            white-space: nowrap;
            position: absolute;
            inset: 0;
        }

        .work-type-select-wrap {
            position: relative;
            display: inline-block;
            flex: 0 1 auto;
            min-width: 0;
            max-width: 100%;
        }

        .work-type-sizer {
            display: block;
            visibility: hidden;
            white-space: nowrap;
            padding: 10px 42px 10px 15px;
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }


        /* main-content acts as a wrapper so children can be positioned in the outer grid */
        .main-content {
            display: contents;
        }

        .video-section {
            grid-column: 1 / 3;
            grid-row: 2;
            background: #d0e7fa;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(229, 57, 53, 0.08);
            min-width: 0;
        }

        .video-section h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .video-section select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            background: white;
        }

        .video-url-input {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .video-url-input input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            font-size: 13px;
        }

        .video-url-input button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .video-url-input button:hover {
            transform: translateY(-1px);
        }

        .video-section select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #videoContainer, #restrictionVideoContainer {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            min-height: 402.02px;
            height: 430px;
        }

        #videoContainer:hover, #restrictionVideoContainer:hover {
            transform: scale(1.02);
        }

        #safetyVideo, #safetyYoutube, #restrictionVideo {
            width: 100%;
            display: block;
            background: #000;
            height: 100%;
            object-fit: cover;
        }

        .video-actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
        }

        .video-link {
            font-size: 14px;
            color: #0f62fe;
            background: rgba(255,255,255,0.9);
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(15,98,254,0.25);
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .video-link:hover {
            transform: translateY(-2px);
        }

        .two-video-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .video-box {
                        background: #e3f0fc !important;
                        border-radius: 15px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            flex: 1;
            min-width: 200px;
            width: 100%;
        }

        html, body {
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .container {
            max-height: calc(100vh - 16px);
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 900px) {
            .two-video-row {
                grid-template-columns: 1fr;
            }
            #videoContainer, #restrictionVideoContainer {
                max-height: 240px;
            }
            .video-box label, .video-section h2 {
                font-size: 16px;
            }
        }

        .worker-section {
            background: linear-gradient(135deg, #43a047 0%, #e53935 100%);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(67, 160, 71, 0.08);
            min-width: 0;
        }

        .worker-section h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .worker-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .worker-form input {
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .worker-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #add-worker {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #add-worker:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #add-worker:active {
            transform: translateY(0);
        }

        #worker-list {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            flex: 1 1 auto;
            min-height: 0;
        }

        #worker-list li {
                    #worker-list li .worker-name {
                        color: #625c5c;
                        font-weight: 900;
                    }
            background: linear-gradient(135deg, #464b4e 0%, #4e6b89 100%);
            margin: 8px 0;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #worker-list li:hover {
            transform: translateX(5px);
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        .footer { display: contents; }

        .footer-section.nemelt { grid-column: 1; grid-row: 3; }
        .footer-section.batlav { grid-column: 2; grid-row: 3; }

        .worker-section {
            grid-column: 3;
            grid-row: 2;
            align-self: stretch;
            justify-self: stretch;
            display: flex;
            flex-direction: column;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-y: auto;
            max-height: none;
            height: auto;
            background: white;
            min-width: 0;
            min-height: 0;
        }

        .footer-section {
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(67, 160, 71, 0.08);
            background: #111;
            min-width: 0;
        }

        .footer-section h2 {
            color: #fff;
        }

        .nemelt {
            background: #e3f0fc !important;
        }

        .batlav {
            background: #e3f0fc !important;
        }

        .footer-section h2 {
            color: #fff;
        }

        .footer-section select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.95);
            transition: all 0.3s ease;
        }

        .footer-section select:focus {
            outline: none;
            border-color: #667eea;
            transform: scale(1.02);
        }

        .footer-section textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            font-size: 1.25em;
            font-weight: 700;
            color: #111;
            text-align: justify;
            text-justify: inter-word;
            resize: vertical;
            min-height: 150px;
            background: rgba(255,255,255,0.95);
            transition: all 0.3s ease;
        }

        .footer-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .footer-section label {
            display: block;
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: white;
            color: #7c3aed;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .pdf-btn {
            background: #10b981;
            color: white;
        }

        /* Saved records section */
        .saved-records-section {
            grid-column: 1 / -1;
            grid-row: 4;
            padding: 25px;
            background: linear-gradient(135deg, #43a047 0%, #e53935 100%);
            border-radius: 15px;
            margin: 0;
            min-width: 0;
        }

        .saved-records-section h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .records-day-group {
            margin-bottom: 20px;
        }

        .records-day-title {
            margin: 0 0 10px 0;
            color: #0f172a;
            background: rgba(255, 255, 255, 0.85);
            border-left: 4px solid #e53935;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 16px;
            font-weight: 800;
        }

        .record-card {
            background: #fff;
            color: #222;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(67, 160, 71, 0.08);
            border-left: 4px solid #e53935;
            animation: slideIn 0.4s ease-out;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0f2fe;
        }

        .record-title {
            font-size: 18px;
            font-weight: 700;
            color: #0369a1;
        }

        .record-date {
            font-size: 14px;
            color: #64748b;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .record-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .record-field {
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .record-field strong {
            display: block;
            color: #475569;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .record-field span {
            color: #1e293b;
            font-size: 14px;
        }

        .workers-list {
            grid-column: 1 / -1;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .workers-list h4 {
            color: #1e40af;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .workers-list ul {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .workers-list li {
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: black;
            border-left: 3px solid #e53935;
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(-100%);
            }
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto auto auto; }
            .video-section { grid-column: 1; }
            .footer-section.nemelt, .footer-section.batlav { grid-column: 1; }
            .worker-section { grid-column: 1; grid-row: auto; max-height: none; overflow: visible; }
            .saved-records-section { grid-column: 1; grid-row: 5; }
            
            .header h1 { font-size: 22px; }
            .header-form { gap: 6px; }
            .header-form span { font-size: 11px; padding: 5px 8px; }
            .header-form input, .header-form select { font-size: 11px; padding: 5px 8px; }
            .header-form input[type="number"] { width: 70px; }
            .header-form input[type="datetime-local"] { min-width: 160px; }
            .header-form select { min-width: 140px; max-width: 100%; }
            .work-type-sizer { font-size: 11px; padding: 5px 34px 5px 8px; }
            #workType { min-width: 0; }
        }

        @media (min-width: 901px) {
            .header-form select {
                max-width: 220px;
            }

            #workType {
                max-width: none;
            }
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const safetySelect = document.getElementById("safety");
            const safetyVideo = document.getElementById("safetyVideo");
            const safetyYoutube = document.getElementById("safetyYoutube");
            const restrictionSelect = document.getElementById("restriction");
            const restrictionVideo = document.getElementById("restrictionVideo");
            const restrictionVideoLink = document.getElementById("restrictionVideoLink");
            const restrictionUrlInput = document.getElementById("restrictionUrlInput");
            const restrictionUrlBtn = document.getElementById("restrictionUrlBtn");
            const addWorkerBtn = document.getElementById("add-worker");
            const workerList = document.getElementById("worker-list");
            const workerSection = document.querySelector(".worker-section");
            const restrictionBox = document.querySelectorAll(".video-box")[1];
            const jobInput = document.getElementById("job");
            const rankInput = document.getElementById("rank");
            const nameInput = document.getElementById("name");
            const workTypeSelect = document.getElementById("workType");
            const workTypeSizer = document.getElementById("workTypeSizer");
            const savedRecordsContainer = document.getElementById("savedRecordsContainer");
            const savedRecordsList = document.getElementById("savedRecordsList");
            const STORAGE_KEY = "ubtz_daily_instruction_records_v1";
            let savedRecords = [];

        function updateWorkTypeWidth() {
            if (!workTypeSelect || !workTypeSizer) {
                return;
            }

            const selectedOption = workTypeSelect.options[workTypeSelect.selectedIndex];
            workTypeSizer.textContent = selectedOption ? selectedOption.text : "";
        }

        function syncWorkerSectionHeight() {
            if (!workerSection || !restrictionBox) {
                return;
            }

            if (window.matchMedia("(max-width: 900px)").matches) {
                workerSection.style.height = "auto";
                workerSection.style.minHeight = "0";
                return;
            }

            const restrictionHeight = Math.ceil(restrictionBox.getBoundingClientRect().height);
            workerSection.style.height = `${restrictionHeight}px`;
            workerSection.style.minHeight = `${restrictionHeight}px`;
        }

        function persistSavedRecords() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(savedRecords));
        }

        function loadSavedRecords() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    return;
                }
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) {
                    savedRecords = parsed;
                }
            } catch (error) {
                console.error("Saved records load error:", error);
                savedRecords = [];
            }
        }

        function getRecordDayKey(record) {
            const source = record.workDate || record.timestamp;
            if (!source) {
                return "Огноо тодорхойгүй";
            }
            const dateObj = new Date(source);
            if (Number.isNaN(dateObj.getTime())) {
                return "Огноо тодорхойгүй";
            }
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, "0");
            const dd = String(dateObj.getDate()).padStart(2, "0");
            return `${yyyy}-${mm}-${dd}`;
        }

        function toDateLabel(dayKey) {
            if (dayKey === "Огноо тодорхойгүй") {
                return dayKey;
            }
            return new Date(`${dayKey}T00:00:00`).toLocaleDateString("mn-MN", {
                year: "numeric",
                month: "long",
                day: "numeric"
            });
        }

        const now = new Date();
        const dateTimeString = now.toISOString().slice(0, 16);
        document.getElementById('workDate').value = dateTimeString;
        updateWorkTypeWidth();
        syncWorkerSectionHeight();

        function updateSafetyVideo() {
            let selectedValue = safetySelect.value;
            let videoSource = "";
            const youtubeVideoId = extractYouTubeId(selectedValue);

            if (selectedValue === "esp_safety") {
                videoSource = "./Osol garsan tohioldol.mp4";
            } else if (selectedValue === "pch2") {
                videoSource = "./pch2.mp4";
            } else if (selectedValue === "pch6") {
                videoSource = "./pch6.mp4";
            } else if (selectedValue === "pull_line_safety") {
                videoSource = "./ZAM 1 OSOL DUH SHTORK.mp4";
            } else if (selectedValue === "replace_sleeper") {
                videoSource = "./ZAM 6 OSOL DUH SHTORK (1).mp4";
            }

            if (youtubeVideoId) {
                safetyVideo.pause();
                safetyVideo.removeAttribute("src");
                while (safetyVideo.firstChild) {
                    safetyVideo.removeChild(safetyVideo.firstChild);
                }
                safetyVideo.style.display = "none";
                safetyYoutube.style.display = "block";
                safetyYoutube.src = `https://www.youtube.com/embed/${youtubeVideoId}?rel=0`;
                return;
            }

            safetyYoutube.src = "";
            safetyYoutube.style.display = "none";
            safetyVideo.style.display = "block";

            if (videoSource) {
                // Remove all <source> children
                while (safetyVideo.firstChild) {
                    safetyVideo.removeChild(safetyVideo.firstChild);
                }
                // Try <source> method first
                const srcEl = document.createElement('source');
                srcEl.src = encodeURI(videoSource);
                srcEl.type = 'video/mp4';
                safetyVideo.appendChild(srcEl);
                // Try to load and play
                let triedFallback = false;
                function tryFallback() {
                    if (!triedFallback) {
                        triedFallback = true;
                        safetyVideo.removeChild(srcEl);
                        safetyVideo.src = encodeURI(videoSource);
                        safetyVideo.load();
                        safetyVideo.play().catch(() => {});
                    } else {
                        alert('Видео ачаалахад алдаа гарлаа. Файлын зам зөв эсэхийг шалгана уу.');
                        console.error('Safety video failed to load', videoSource);
                    }
                }
                safetyVideo.onerror = tryFallback;
                try {
                    safetyVideo.load();
                    safetyVideo.play().catch(() => {});
                } catch (err) {
                    tryFallback();
                }
            }
        }

        workTypeSelect.addEventListener("change", updateWorkTypeWidth);
        window.addEventListener("resize", updateWorkTypeWidth);
        window.addEventListener("resize", syncWorkerSectionHeight);

        if (typeof ResizeObserver !== "undefined" && restrictionBox) {
            new ResizeObserver(syncWorkerSectionHeight).observe(restrictionBox);
        }

        safetySelect.addEventListener("change", updateSafetyVideo);

        function extractYouTubeId(value) {
            if (!value) {
                return "";
            }
            const trimmed = value.trim();
            const idPattern = /^[A-Za-z0-9_-]{11}$/;
            if (idPattern.test(trimmed)) {
                return trimmed;
            }
            const knownPatterns = [
                /youtu\.be\/([A-Za-z0-9_-]{11})/,
                /[?&]v=([A-Za-z0-9_-]{11})/,
                /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/,
                /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/,
                /youtube\.com\/v\/([A-Za-z0-9_-]{11})/
            ];
            for (const pattern of knownPatterns) {
                const match = trimmed.match(pattern);
                if (match && match[1]) {
                    return match[1];
                }
            }
            return "";
        }

        function updateRestrictionVideo(option, shouldAutoplay = false) {
            if (!option) {
                return;
            }
            const videoId = extractYouTubeId(option.dataset.youtubeId || option.value);
            if (!videoId) {
                return;
            }
            const autoplayParam = shouldAutoplay ? "&autoplay=1" : "";
            const embedUrl = `https://www.youtube.com/embed/${videoId}?rel=0${autoplayParam}`;
            restrictionVideo.src = "about:blank";
            restrictionVideo.src = embedUrl;
            restrictionVideoLink.href = `https://youtu.be/${videoId}`;
        }

        restrictionSelect.addEventListener("change", function () {
            updateRestrictionVideo(restrictionSelect.selectedOptions[0], true);
        });

        updateSafetyVideo();
        updateRestrictionVideo(restrictionSelect.selectedOptions[0]);

        if (restrictionUrlBtn && restrictionUrlInput) {
            restrictionUrlBtn.addEventListener("click", function () {
                const videoId = extractYouTubeId(restrictionUrlInput.value);
                if (!videoId) {
                    alert('YouTube бичлэгийн холбоосын форматыг шалгана уу.');
                    return;
                }
                const customOption = document.createElement("option");
                customOption.value = `custom_${Date.now()}`;
                customOption.dataset.youtubeId = videoId;
                customOption.textContent = `Шинэ бичлэг (${videoId})`;
                restrictionSelect.appendChild(customOption);
                customOption.selected = true;
                updateRestrictionVideo(customOption);
                restrictionUrlInput.value = "";
            });
        }

        function handleAddWorker() {
            const job = jobInput.value.trim();
            const rank = rankInput.value.trim();
            const name = nameInput.value.trim();

            if (job && rank && name) {
                const existingWorkers = workerList.getElementsByTagName("li");
                for (let worker of existingWorkers) {
                    if (worker.dataset.name === name) {
                        alert(`${name} аль хэдийн жагсаалтад байна!`);
                        return;
                    }
                }

                const listItem = document.createElement("li");
                listItem.innerHTML = `<span><span class="worker-name">${name}</span> - ${job} (${rank}-р зэрэг)</span>`;
                listItem.dataset.name = name;
                listItem.dataset.job = job;
                listItem.dataset.rank = rank;

                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "✖ Устгах";
                deleteBtn.classList.add("delete-btn");
                deleteBtn.addEventListener("click", function () {
                    listItem.style.animation = "slideOut 0.3s ease-out";
                    setTimeout(() => {
                        workerList.removeChild(listItem);
                    }, 300);
                });

                listItem.appendChild(deleteBtn);
                workerList.appendChild(listItem);

                jobInput.value = "";
                rankInput.value = "";
                nameInput.value = "";
                jobInput.focus();
            } else {
                alert("Бүх талбарыг бөглөнө үү!");
            }
        }

        addWorkerBtn.addEventListener("click", handleAddWorker);

        [jobInput, rankInput, nameInput].forEach((input) => {
            input.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    handleAddWorker();
                }
            });
        });

        document.getElementById('saveDataBtn').addEventListener('click', function() {
            const formData = {
                workDate: document.getElementById('workDate').value,
                location1: document.getElementById('location1').value,
                location2: document.getElementById('location2').value,
                distance1: document.getElementById('distance1').value,
                meter1: document.getElementById('meter1').value,
                distance2: document.getElementById('distance2').value,
                meter2: document.getElementById('meter2').value,
                workType: document.getElementById('workType').value,
                safety: document.getElementById('safety').value,
                restriction: document.getElementById('restriction').value,
                additionalNotes: document.getElementById('additionalNotes').value,
                preparedBy: document.getElementById('preparedBy').value,
                reviewedBy: document.getElementById('reviewedBy').value,
                workers: [],
                timestamp: new Date().toISOString()
            };

            const workers = workerList.getElementsByTagName('li');
            for (let worker of workers) {
                formData.workers.push({
                    name: worker.dataset.name,
                    job: worker.dataset.job,
                    rank: worker.dataset.rank
                });
            }

            savedRecords.push(formData);
            persistSavedRecords();
            displaySavedRecords();
            resetForm();
            alert('✓ Өгөгдөл амжилттай хадгалагдлаа!');
        });

        function displaySavedRecords() {
            if (savedRecords.length === 0) {
                savedRecordsContainer.style.display = 'none';
                return;
            }

            savedRecordsContainer.style.display = 'block';
            savedRecordsList.innerHTML = '';

            const groupedRecords = {};
            const sortedRecords = [...savedRecords].sort((a, b) => {
                const timeA = new Date(a.workDate || a.timestamp || 0).getTime();
                const timeB = new Date(b.workDate || b.timestamp || 0).getTime();
                return timeB - timeA;
            });

            sortedRecords.forEach((record) => {
                const dayKey = getRecordDayKey(record);
                if (!groupedRecords[dayKey]) {
                    groupedRecords[dayKey] = [];
                }
                groupedRecords[dayKey].push(record);
            });

            const dayKeys = Object.keys(groupedRecords).sort((a, b) => {
                if (a === "Огноо тодорхойгүй") {
                    return 1;
                }
                if (b === "Огноо тодорхойгүй") {
                    return -1;
                }
                return b.localeCompare(a);
            });

            dayKeys.forEach((dayKey) => {
                const dayGroup = document.createElement('div');
                dayGroup.className = 'records-day-group';

                const dayTitle = document.createElement('h3');
                dayTitle.className = 'records-day-title';
                dayTitle.textContent = `${toDateLabel(dayKey)} (${groupedRecords[dayKey].length})`;
                dayGroup.appendChild(dayTitle);

                groupedRecords[dayKey].forEach((record) => {
                const card = document.createElement('div');
                card.className = 'record-card';

                const recordDate = new Date(record.workDate || record.timestamp);
                const formatDate = Number.isNaN(recordDate.getTime())
                    ? 'Огноо тодорхойгүй'
                    : recordDate.toLocaleString('mn-MN');
                
                card.innerHTML = `
                    <div class="record-header" style="justify-content: flex-start;">
                        <div class="record-date" style="font-weight:900;font-size:1.1em;letter-spacing:1px; color:#111;">${formatDate}</div>
                    </div>
                    <div class="record-body">
                        <div class="record-field">
                            <strong>Байршил</strong>
                            <span>${record.location1} - ${record.location2}</span>
                        </div>
                        <div class="record-field">
                            <strong>Зай</strong>
                            <span>${record.distance1} км ${record.meter1} м - ${record.distance2} км ${record.meter2} м</span>
                        </div>
                        <div class="record-field">
                            <strong>Ажлын төрөл</strong>
                            <span>${record.workType}</span>
                        </div>
                        <div class="record-field">
                            <strong>Боловсруулсан</strong>
                            <span>${record.preparedBy}</span>
                        </div>
                        <div class="record-field">
                            <strong>Хянасан</strong>
                            <span>${record.reviewedBy}</span>
                        </div>
                        ${record.workers.length > 0 ? `
                        <div class="workers-list">
                            <h4>Ажилтнууд:</h4>
                            <ul>
                                ${record.workers.map(w => `<li><strong>${w.name}</strong> - ${w.job} (${w.rank}-р зэрэг)</li>`).join('')}
                            </ul>
                        </div>
                        ` : ''}
                        <div class="record-field" style="grid-column: 1 / -1;">
                            <strong>Нэмэлт мэдээлэл</strong>
                            <span>${record.additionalNotes}</span>
                        </div>
                    </div>
                `;

                dayGroup.appendChild(card);
                });

                savedRecordsList.appendChild(dayGroup);
            });
        }

        function resetForm() {
            const now = new Date();
            document.getElementById('workDate').value = now.toISOString().slice(0, 16);
            document.getElementById('distance1').value = '';
            document.getElementById('meter1').value = '';
            document.getElementById('distance2').value = '';
            document.getElementById('meter2').value = '';
            
            workerList.innerHTML = '';
        }

        const savePdfBtn = document.getElementById('savePdfBtn');
        if (savePdfBtn) {
            savePdfBtn.addEventListener('click', function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text('AJLYN GAZRYN BATALAGAAJUULALT', 20, 20);
            
            doc.setFontSize(12);
            const workDate = document.getElementById('workDate').value || 'Ogonoo oruulaagui';
            const location1 = document.getElementById('location1').value || 'SAIKHAN';
            const location2 = document.getElementById('location2').value || 'SAIKHAN';
            const workType = document.getElementById('workType').value || '';
            
            doc.text(`Ogonoo: ${workDate}`, 20, 35);
            doc.text(`Bayrshil: ${location1} - ${location2}`, 20, 45);
            doc.text(`Ajlyn torol: ${workType}`, 20, 55);
            
            doc.setFontSize(14);
            doc.text('Ajiltnuud:', 20, 70);
            doc.setFontSize(11);
            const workers = workerList.getElementsByTagName('li');
            let yPos = 80;
            for (let i = 0; i < workers.length; i++) {
                const workerText = workers[i].querySelector('span').textContent;
                doc.text(`${i + 1}. ${workerText}`, 25, yPos);
                yPos += 8;
            }

            if (yPos < 200) {
                doc.setFontSize(12);
                doc.text('Nemelt medeelel:', 20, yPos + 10);
                doc.setFontSize(10);
                const notes = document.getElementById('additionalNotes').value;
                const splitNotes = doc.splitTextToSize(notes, 170);
                doc.text(splitNotes, 20, yPos + 20);
            }

            doc.setFontSize(11);
            doc.text(`Bolovsoruulsan: ${document.getElementById('preparedBy').value}`, 20, 270);
            doc.text(`Hyanasan: ${document.getElementById('reviewedBy').value}`, 20, 280);

            const fileName = `ajlyn_gazryn_burtgel_${new Date().getTime()}.pdf`;
            doc.save(fileName);
            alert('✓ PDF файл амжилттай татагдлаа!');
        });
        }

        loadSavedRecords();
        displaySavedRecords();
    });
</script>
