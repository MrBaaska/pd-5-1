<!DOCTYPE html>
<html lang="mn">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ШБАЗ PDF Viewer</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #f3efe6;
			--ink: #132a2f;
			--muted: #5c6d70;
			--panel: rgba(255, 252, 247, 0.86);
			--line: rgba(19, 42, 47, 0.14);
			--accent: #c25b32;
			--accent-dark: #8f3f20;
			--accent-soft: rgba(194, 91, 50, 0.12);
			--shadow: 0 24px 60px rgba(35, 32, 27, 0.14);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: 'IBM Plex Sans', sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at top left, rgba(194, 91, 50, 0.14), transparent 28%),
				radial-gradient(circle at bottom right, rgba(28, 112, 118, 0.16), transparent 32%),
				linear-gradient(180deg, #f6f1e6 0%, #efe8db 100%);
		}

		.shell {
			width: min(1180px, calc(100% - 32px));
			margin: 0 auto;
			padding: 28px 0 24px;
		}

		.hero {
			display: grid;
			gap: 18px;
			margin-bottom: 18px;
			padding: 24px;
			border: 1px solid var(--line);
			border-radius: 28px;
			background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(255,247,239,0.78));
			box-shadow: var(--shadow);
		}

		.eyebrow {
			margin: 0;
			font-family: 'IBM Plex Mono', monospace;
			font-size: 12px;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--accent-dark);
		}

		h1 {
			margin: 0;
			font-size: clamp(28px, 4vw, 44px);
			line-height: 1.05;
		}

		.hero p {
			margin: 0;
			max-width: 760px;
			color: var(--muted);
			font-size: 15px;
			line-height: 1.7;
		}

		.toolbar {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 18px;
			padding: 16px 18px;
			border: 1px solid var(--line);
			border-radius: 22px;
			background: var(--panel);
			backdrop-filter: blur(14px);
			box-shadow: var(--shadow);
		}

		.toolbar-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			align-items: center;
		}

		.pick-button,
		.ghost-button {
			appearance: none;
			border: 0;
			border-radius: 999px;
			font: inherit;
			cursor: pointer;
			transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
		}

		.pick-button {
			padding: 12px 18px;
			color: #fffaf4;
			background: linear-gradient(135deg, var(--accent), var(--accent-dark));
			box-shadow: 0 14px 28px rgba(143, 63, 32, 0.22);
		}

		.ghost-button {
			padding: 11px 16px;
			color: var(--ink);
			background: transparent;
			border: 1px solid var(--line);
		}

		.pick-button:hover,
		.ghost-button:hover {
			transform: translateY(-1px);
		}

		.file-meta {
			display: flex;
			flex-wrap: wrap;
			gap: 10px 18px;
			align-items: center;
			color: var(--muted);
			font-size: 14px;
		}

		.file-name {
			color: var(--ink);
			font-weight: 600;
		}

		.viewer-card {
			overflow: hidden;
			border: 1px solid var(--line);
			border-radius: 28px;
			background: rgba(255, 253, 250, 0.88);
			box-shadow: var(--shadow);
		}

		.viewer-header {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			align-items: center;
			justify-content: space-between;
			padding: 14px 18px;
			border-bottom: 1px solid var(--line);
			background: rgba(19, 42, 47, 0.035);
		}

		.viewer-title {
			font-weight: 600;
			letter-spacing: 0.01em;
		}

		.viewer-status {
			font-family: 'IBM Plex Mono', monospace;
			font-size: 12px;
			color: var(--muted);
		}

		.viewer-body {
			min-height: 72vh;
			background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(247,243,236,0.96));
		}

		.pdf-frame {
			width: 100%;
			height: 72vh;
			border: 0;
			display: none;
			background: #f3efe6;
		}

		.pdf-frame.visible {
			display: block;
		}

		.sr-only {
			position: absolute;
			width: 1px;
			height: 1px;
			padding: 0;
			margin: -1px;
			overflow: hidden;
			clip: rect(0, 0, 0, 0);
			white-space: nowrap;
			border: 0;
		}

		@media (max-width: 720px) {
			.shell {
				width: min(100% - 18px, 1180px);
				padding-top: 14px;
			}

			.hero,
			.toolbar,
			.viewer-header {
				padding-left: 16px;
				padding-right: 16px;
			}

			.viewer-body,
			.pdf-frame {
				min-height: 66vh;
				height: 66vh;
			}
		}
	</style>
</head>
<body>
	<main class="shell">
		<section class="hero">
			<h1>Шинэ бүтээл ашигтай загвар</h1>
		</section>

		<section class="toolbar">
			<div class="toolbar-actions">
				<label class="pick-button" for="pdf-input">PDF файл сонгох</label>
				<button class="ghost-button" type="button" id="clear-button">Цэвэрлэх</button>
				<input class="sr-only" id="pdf-input" type="file" accept="application/pdf,.pdf">
			</div>
			<div class="file-meta" id="file-meta">
				<span>Төлөв:</span>
				<span class="file-name" id="file-name">Файл сонгогдоогүй</span>
				<span id="file-size"></span>
			</div>
		</section>

		<section class="viewer-card">
			<div class="viewer-header">
				<div class="viewer-title">ШБАЗ баримт харах самбар</div>
				<div class="viewer-status" id="viewer-status">NO PDF LOADED</div>
			</div>
			<div class="viewer-body">
				<iframe id="pdf-frame" class="pdf-frame" title="ШБАЗ PDF viewer"></iframe>
			</div>
		</section>
	</main>

	<script>
		const STORAGE_DB_NAME = 'shbaz-pdf-storage';
		const STORAGE_STORE_NAME = 'documents';
		const STORAGE_RECORD_KEY = 'active-pdf';
		const fileInput = document.getElementById('pdf-input');
		const clearButton = document.getElementById('clear-button');
		const fileName = document.getElementById('file-name');
		const fileSize = document.getElementById('file-size');
		const viewerStatus = document.getElementById('viewer-status');
		const pdfFrame = document.getElementById('pdf-frame');

		let currentPdfUrl = null;
		let storageReady = null;

		function openStorage() {
			if (!('indexedDB' in window)) {
				return Promise.reject(new Error('IndexedDB is not supported in this browser.'));
			}

			if (!storageReady) {
				storageReady = new Promise(function(resolve, reject) {
					const request = window.indexedDB.open(STORAGE_DB_NAME, 1);

					request.onupgradeneeded = function(event) {
						const db = event.target.result;
						if (!db.objectStoreNames.contains(STORAGE_STORE_NAME)) {
							db.createObjectStore(STORAGE_STORE_NAME);
						}
					};

					request.onsuccess = function(event) {
						resolve(event.target.result);
					};

					request.onerror = function(event) {
						reject(event.target.error || new Error('Failed to open IndexedDB.'));
					};
				});
			}

			return storageReady;
		}

		async function writeStoredPdf(file) {
			const db = await openStorage();
			return new Promise(function(resolve, reject) {
				const transaction = db.transaction(STORAGE_STORE_NAME, 'readwrite');
				const store = transaction.objectStore(STORAGE_STORE_NAME);
				const record = {
					name: file.name,
					type: file.type || 'application/pdf',
					size: file.size || 0,
					updatedAt: Date.now(),
					blob: file
				};

				transaction.oncomplete = function() {
					resolve();
				};

				transaction.onerror = function(event) {
					reject(event.target.error || new Error('Failed to save PDF.'));
				};

				store.put(record, STORAGE_RECORD_KEY);
			});
		}

		async function readStoredPdf() {
			const db = await openStorage();
			return new Promise(function(resolve, reject) {
				const transaction = db.transaction(STORAGE_STORE_NAME, 'readonly');
				const store = transaction.objectStore(STORAGE_STORE_NAME);
				const request = store.get(STORAGE_RECORD_KEY);

				request.onsuccess = function() {
					resolve(request.result || null);
				};

				request.onerror = function(event) {
					reject(event.target.error || new Error('Failed to read saved PDF.'));
				};
			});
		}

		async function removeStoredPdf() {
			const db = await openStorage();
			return new Promise(function(resolve, reject) {
				const transaction = db.transaction(STORAGE_STORE_NAME, 'readwrite');
				const store = transaction.objectStore(STORAGE_STORE_NAME);

				transaction.oncomplete = function() {
					resolve();
				};

				transaction.onerror = function(event) {
					reject(event.target.error || new Error('Failed to remove saved PDF.'));
				};

				store.delete(STORAGE_RECORD_KEY);
			});
		}

		function formatBytes(bytes) {
			if (!bytes) {
				return '';
			}

			if (bytes < 1024 * 1024) {
				return (bytes / 1024).toFixed(1) + ' KB';
			}

			return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
		}

		async function clearPreview(resetInput, removeStored) {
			if (currentPdfUrl) {
				URL.revokeObjectURL(currentPdfUrl);
				currentPdfUrl = null;
			}

			pdfFrame.removeAttribute('src');
			pdfFrame.classList.remove('visible');
			fileName.textContent = 'Файл сонгогдоогүй';
			fileSize.textContent = '';
			viewerStatus.textContent = 'NO PDF LOADED';

			if (removeStored) {
				try {
					await removeStoredPdf();
				} catch (error) {
					console.warn('Saved PDF clear failed:', error);
				}
			}

			if (resetInput) {
				fileInput.value = '';
			}
		}

		async function showPdf(file, skipPersist) {
			if (!file) {
				await clearPreview(false, false);
				return;
			}

			const isPdf = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
			if (!isPdf) {
				window.alert('Зөвхөн PDF файл сонгоно уу.');
				await clearPreview(true, false);
				return;
			}

			if (currentPdfUrl) {
				URL.revokeObjectURL(currentPdfUrl);
			}

			currentPdfUrl = URL.createObjectURL(file);
			pdfFrame.src = currentPdfUrl;
			pdfFrame.classList.add('visible');
			fileName.textContent = file.name;
			fileSize.textContent = formatBytes(file.size);
			viewerStatus.textContent = skipPersist ? 'PDF RESTORED' : 'PDF READY';

			if (!skipPersist) {
				try {
					await writeStoredPdf(file);
				} catch (error) {
					console.warn('PDF autosave failed:', error);
					viewerStatus.textContent = 'PDF READY / SAVE FAILED';
				}
			}
		}

		async function handleFileList(files) {
			if (!files || !files.length) {
				return;
			}

			await showPdf(files[0], false);
		}

		async function restoreSavedPdf() {
			try {
				const record = await readStoredPdf();
				if (!record || !record.blob) {
					return;
				}

				const restoredFile = new File(
					[record.blob],
					record.name || 'shbaz.pdf',
					{ type: record.type || 'application/pdf', lastModified: record.updatedAt || Date.now() }
				);

				await showPdf(restoredFile, true);
			} catch (error) {
				console.warn('Saved PDF restore failed:', error);
			}
		}

		fileInput.addEventListener('change', async function(event) {
			await handleFileList(event.target.files);
		});

		clearButton.addEventListener('click', async function() {
			await clearPreview(true, true);
		});

		clearPreview(false, false).then(restoreSavedPdf);
	</script>
</body>
</html>
