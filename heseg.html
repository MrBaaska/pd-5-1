<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Замын хэсгийн архив</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --ink:        #0f1923;
  --steel:      #1e3a5f;
  --steel-mid:  #2563a8;
  --amber:      #e8a020;
  --amber-light:#fef3dc;
  --surface:    #f8f6f2;
  --card:       #ffffff;
  --muted:      #64748b;
  --border:     #dde3ec;
  --danger:     #dc2626;
  --success:    #16a34a;
  --r:          8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--surface);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: #fff;
  padding: 0;
  position: relative;
  overflow: hidden;
}
.header-rail {
  height: 4px;
  background: repeating-linear-gradient(90deg, var(--amber) 0 40px, transparent 40px 56px);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 36px 24px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.header-icon {
  width: 64px; height: 64px;
  background: var(--amber);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  color: var(--ink);
  flex-shrink: 0;
}
.header-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.9rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: #fff;
}
.header-text p {
  color: #94a3b8;
  font-size: 0.9rem;
  margin-top: 6px;
}
.header-actions {
  margin-left: auto;
}
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 18px;
  border-radius: var(--r);
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s, transform 0.1s;
  text-decoration: none;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--amber); color: var(--ink); }
.btn-primary:hover { opacity: 0.9; }
.btn-ghost { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.btn-ghost:hover { background: rgba(255,255,255,0.18); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-danger { background: #fee2e2; color: var(--danger); }
.btn-danger:hover { background: #fecaca; }
.btn-success { background: #dcfce7; color: var(--success); }

/* ── YEAR TIMELINE RAIL ── */
.timeline-section {
  background: var(--steel);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
}
.timeline-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.timeline-inner::-webkit-scrollbar { display: none; }
.timeline-label {
  color: #94a3b8;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px 16px 14px 0;
  white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,0.1);
  margin-right: 12px;
  display: flex; align-items: center;
}
.year-pill {
  padding: 14px 16px;
  cursor: pointer;
  color: #94a3b8;
  font-size: 0.88rem;
  font-weight: 500;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  display: flex; align-items: center;
}
.year-pill:hover { color: #fff; }
.year-pill.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
  font-weight: 700;
}
.year-pill-all {
  color: #fff;
  font-weight: 600;
}

/* ── MAIN LAYOUT ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ── YEAR HEADING ── */
.year-heading {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}
.year-heading h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 900;
  color: var(--steel);
  line-height: 1;
}
.year-heading .divider {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── TWO-COL INFO ── */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 32px;
}
@media(max-width: 680px) { .info-grid { grid-template-columns: 1fr; } }
.info-card {
  background: var(--card);
  border-radius: var(--r);
  border: 1px solid var(--border);
  padding: 24px;
}
.info-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.info-card-header h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--steel);
  display: flex; align-items: center; gap: 8px;
}
.info-card-header h3 i { color: var(--amber); }
.info-card p, .info-card ul { font-size: 0.88rem; color: #374151; }
.info-card ul { padding-left: 18px; }
.info-card ul li { margin-bottom: 4px; }
.info-card textarea, .info-card input[type=text] {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit; font-size: 0.88rem;
  resize: vertical; min-height: 80px;
  margin-top: 4px;
  color: var(--ink);
}
.info-card input[type=text] { min-height: unset; }

/* ── TEAM STRUCTURE BOX ── */
.team-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 32px;
  overflow: hidden;
}
.team-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.team-table td {
  border: 1px solid #cbd5e1;
  padding: 10px;
  font-size: 0.9rem;
  text-align: center;
  vertical-align: middle;
}
.team-table .wide-cell { padding: 16px 12px; }
.team-table .big-cell { padding: 28px 12px; }
.team-table input {
  width: 100%;
  border: 1px solid transparent;
  background: transparent;
  text-align: center;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--ink);
  padding: 4px;
  border-radius: 4px;
}
.team-table textarea {
  width: 100%;
  border: 1px solid var(--border);
  background: #fff;
  text-align: left;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--ink);
  padding: 8px;
  border-radius: 6px;
  resize: vertical;
  min-height: 92px;
}
.team-table input:focus {
  outline: none;
  border-color: var(--steel-mid);
  background: #fff;
}
.team-table textarea:focus {
  outline: none;
  border-color: var(--steel-mid);
}
.team-media {
  margin-top: 8px;
}
.team-media-preview {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #f8fafc;
  display: block;
}
.team-media-preview.landscape {
  height: auto;
  max-height: none;
  object-fit: cover;
}
.team-media-preview.portrait {
  height: auto;
  max-height: none;
  object-fit: contain;
}
.team-media-actions {
  margin-top: 6px;
  display: flex;
  gap: 6px;
  justify-content: center;
}
.team-media-hint {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 6px;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--steel);
}
.section-title i { color: var(--amber); margin-right: 8px; }

/* ── GALLERY ── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.gallery-card {
  background: var(--card);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s;
}
.gallery-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
.gallery-img-wrap {
  position: relative;
  height: 200px;
  cursor: pointer;
  overflow: hidden;
  background: #e2e8f0;
}
.gallery-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.35s;
}
.gallery-card:hover .gallery-img-wrap img { transform: scale(1.06); }
.gallery-badge {
  position: absolute;
  top: 10px; left: 10px;
  background: var(--amber);
  color: var(--ink);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
}
.gallery-body { padding: 16px; }
.gallery-body h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
.gallery-body p { font-size: 0.82rem; color: var(--muted); }
.gallery-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.gallery-year-tag {
  font-size: 0.75rem; font-weight: 600;
  color: var(--steel-mid);
  background: #dbeafe;
  padding: 2px 8px; border-radius: 4px;
}
.gallery-actions { display: flex; gap: 6px; }

/* ── NUMERIC RECORDS ── */
.records-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
  background: var(--card);
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 40px;
}
.records-table th {
  background: var(--steel);
  color: #fff;
  padding: 12px 16px;
  text-align: left;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.records-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.records-table tr:last-child td { border-bottom: none; }
.records-table tr:hover td { background: #f8fafc; }
.records-table td input {
  width: 100%; border: 1px solid transparent; background: transparent;
  font-family: inherit; font-size: 0.875rem; color: var(--ink);
  padding: 2px 4px; border-radius: 4px;
}
.records-table td input:focus {
  outline: none; border-color: var(--steel-mid);
  background: #fff;
}

/* ── ADD RECORD FORM ── */
.add-form {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 24px;
}
.add-form h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 14px; color: var(--steel); }
.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}
.form-row input, .form-row textarea, .form-row select {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 0.85rem;
  color: var(--ink);
  background: var(--surface);
}
.form-row input:focus, .form-row textarea:focus, .form-row select:focus {
  outline: none; border-color: var(--steel-mid); background: #fff;
}
.form-row textarea { resize: vertical; min-height: 70px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #1a2332;
  border-radius: 10px;
  overflow: hidden;
  max-width: 680px;
  width: 100%;
}
.modal-box img {
  width: 100%;
  max-height: 65vh;
  object-fit: contain;
  display: block;
}
.modal-caption {
  padding: 20px;
}
.modal-caption h3 { color: var(--amber); font-size: 1.1rem; margin-bottom: 4px; }
.modal-caption p { color: #94a3b8; font-size: 0.88rem; }
.modal-close {
  position: absolute;
  top: 16px; right: 20px;
  color: #fff; font-size: 2rem;
  cursor: pointer; line-height: 1;
  background: none; border: none; z-index: 1001;
}

/* ── VIDEO RECORDS ── */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.video-card {
  background: var(--card);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
}
.video-wrap {
  position: relative;
  padding-bottom: 56.25%;
  background: #0f1923;
}
.video-wrap iframe, .video-wrap video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
}
.video-body { padding: 14px; }
.video-body h4 { font-size: 0.9rem; font-weight: 700; }
.video-body p { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
.video-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
  border: 2px dashed var(--border);
  border-radius: var(--r);
  margin-bottom: 32px;
}
.empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; color: #cbd5e1; }
.empty-state p { font-size: 0.9rem; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ink); color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 0.88rem;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.success { border-left: 4px solid var(--success); }
#toast.error { border-left: 4px solid var(--danger); }

/* ── AUTOSAVE ── */
#autosave-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--steel);
  color: #94a3b8;
  font-size: 0.78rem;
  padding: 5px 16px;
  display: flex; align-items: center; gap: 8px;
  z-index: 200;
  border-top: 1px solid rgba(255,255,255,0.08);
}
#autosave-bar .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background 0.3s;
}
#autosave-bar .dot.saved { background: var(--success); }

/* ── RESPONSIVE ── */
@media(max-width: 600px) {
  .header-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
  .header-actions { width: 100%; }
  .main { padding: 20px 16px 60px; }
  .year-heading h2 { font-size: 1.8rem; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-rail"></div>
  <div class="header-inner">
    <div class="header-icon"><i class="fa-solid fa-train-subway"></i></div>
    <div class="header-text">
      <h1>Хэсгийн түүхэн замнал</h1>
      <p>· Бүртгэл мэдээллийн нэгдсэн сан</p>
    </div>
    <div class="header-actions" style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-ghost" onclick="autosave(true);toast('Хадгалагдлаа ✓','success')">
        <i class="fa-solid fa-floppy-disk"></i> Хадгалах
      </button>
      <button class="btn btn-primary" onclick="openAddYearModal()">
        <i class="fa-solid fa-plus"></i> Жил нэмэх
      </button>
    </div>
  </div>
</header>

<!-- YEAR TIMELINE -->
<nav class="timeline-section">
  <div class="timeline-inner" id="timelineNav">
    <span class="timeline-label"><i class="fa-solid fa-train" style="color:var(--amber);margin-right:6px"></i> Жилүүд</span>
    <div class="year-pill year-pill-all active" data-year="all" onclick="filterYear('all', this)">Бүгд</div>
  </div>
</nav>

<main class="main" id="mainContent"></main>

<!-- IMAGE MODAL -->
<div class="modal-overlay" id="imgModal" onclick="closeImgModal(event)">
  <button class="modal-close" onclick="closeImgModal()">&times;</button>
  <div class="modal-box">
    <img id="modalImg" src="" alt="">
    <div class="modal-caption">
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

<!-- ADD YEAR MODAL (inline form) -->
<div class="modal-overlay" id="addYearModal" onclick="closeYearModal(event)">
  <button class="modal-close" onclick="closeYearModal()">&times;</button>
  <div class="modal-box" style="padding:28px;max-width:420px;background:#fff;color:var(--ink)">
    <h3 style="font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--steel);margin-bottom:20px">Шинэ жил нэмэх</h3>
    <div class="form-row" style="grid-template-columns:1fr">
      <input type="number" id="newYearInput" placeholder="Жил (жишээ: 2024)" min="1990" max="2100">
      <input type="text" id="newManagerInput" placeholder="Хэсгийн дарга">
      <input type="number" id="newStaffInput" placeholder="Ажилтны тоо" min="1">
      <textarea id="newGeoInput" placeholder="Газар зүйн онцлог"></textarea>
      <textarea id="newHistoryInput" placeholder="Түүх, тайлбар"></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
      <button class="btn btn-ghost" style="color:var(--ink);border-color:var(--border);background:#f1f5f9" onclick="closeYearModal()">Болих</button>
      <button class="btn btn-primary" onclick="addYear()">Нэмэх</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="autosave-bar">
  <span class="dot" id="autosaveDot"></span>
  <span id="autosaveText">Автомат хадгалалт идэвхтэй — 2 минут тутамд хадгалагдана</span>
</div>

let activeYear = 'all';

// ── AUTOSAVE ──
const SAVE_KEY = 'railway_archive_db';
const AUTOSAVE_MS = 2 * 60 * 1000; // 2 minutes
const AUTOSAVE_DEBOUNCE_MS = 700;
let autosaveTimer;

function serializeDb() {
  // Keep serializable URLs only (https/data). Any transient blob URL is skipped.
  const out = { years: {} };
  for (const [yr, data] of Object.entries(db.years)) {
    out.years[yr] = {
      manager: data.manager,
      staff: data.staff,
      geo: data.geo,
      history: data.history,
      records: data.records || [],
      teamBox: data.teamBox ? {
        ...data.teamBox,
        images: data.teamBox.images || {}
      } : undefined,
      // photos/videos with data: URLs are kept; blob: URLs are dropped
      photos: (data.photos || []).filter(p => !p.url.startsWith('blob:')),
      videos: (data.videos || []).filter(v => !v.url.startsWith('blob:'))
    };
  }
  return JSON.stringify(out);
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (saved && saved.years) {
      db = saved;
      return true;
    }
  } catch(e) {}
  return false;
}

function writeAutosave(manual) {
  try {
    localStorage.setItem(SAVE_KEY, serializeDb());
    const dot = document.getElementById('autosaveDot');
    const txt = document.getElementById('autosaveText');
    dot.classList.add('saved');
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
    txt.textContent = (manual ? 'Гараар хадгалагдлаа' : 'Автоматаар хадгалагдлаа') + ' — ' + time;
    setTimeout(() => {
      dot.classList.remove('saved');
      txt.textContent = 'Автомат хадгалалт идэвхтэй — 2 минут тутамд хадгалагдана';
    }, 3000);
  } catch(e) {
    console.warn('Autosave failed:', e);
  }
}

function autosave(manual) {
  if (manual) {
    clearTimeout(autosaveTimer);
    writeAutosave(true);
    return;
  }
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => writeAutosave(false), AUTOSAVE_DEBOUNCE_MS);
}

setInterval(() => writeAutosave(false), AUTOSAVE_MS);

window.addEventListener('beforeunload', () => writeAutosave(false));
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') writeAutosave(false);
});

// ── Render everything ──
function render() {
  renderNav();
  renderMain();
}

function renderNav() {
  const nav = document.getElementById('timelineNav');
  // Keep label + "Бүгд" pill, rebuild year pills
  const existing = nav.querySelectorAll('.year-pill:not(.year-pill-all)');
  existing.forEach(e => e.remove());

  const years = Object.keys(db.years).map(Number).sort();
  years.forEach(y => {
    const pill = document.createElement('div');
    pill.className = 'year-pill' + (activeYear == y ? ' active' : '');
    pill.dataset.year = y;
    pill.textContent = y;
    pill.onclick = () => filterYear(y, pill);
    nav.appendChild(pill);
  });

  // Update "Бүгд" active state
  const allPill = nav.querySelector('.year-pill-all');
  allPill.className = 'year-pill year-pill-all' + (activeYear === 'all' ? ' active' : '');
}

function filterYear(y, el) {
  activeYear = y;
  document.querySelectorAll('.year-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderMain();
}

function renderMain() {
  const main = document.getElementById('mainContent');
  const years = Object.keys(db.years).map(Number).sort();
  const toShow = activeYear === 'all' ? years : [Number(activeYear)];

  if (!toShow.length || (toShow.length === 1 && !db.years[toShow[0]])) {
    main.innerHTML = `<div class="empty-state"><i class="fa-regular fa-folder-open"></i><p>Мэдээлэл олдсонгүй.</p></div>`;
    return;
  }

  main.innerHTML = '';

  toShow.forEach(year => {
    const data = db.years[year];
    if (!data) return;
    ensureTeamBoxData(year);
    main.appendChild(buildYearBlock(year, data));
  });
}

function ensureTeamBoxData(year) {
  const y = db.years[year];
  if (!y.teamBox) {
    y.teamBox = {
      master: 'Хэсгийн мастер',
      intro: 'Танилцуулга',
      pdb: ['ПДБк', 'ПДБр', 'ПДБс', 'Оны шилдэг ажилтан'],
      staffLabel: 'Хэсгийн нийт ажилтан',
      roles: ['Жолооч', 'Үйлчлэгч', 'Сахиул', 'Төр засагч'],
      images: {}
    };
  } else if (!y.teamBox.images || typeof y.teamBox.images !== 'object') {
    y.teamBox.images = {};
  }
  if (Array.isArray(y.teamBox.pdb) && y.teamBox.pdb[3] === 'ПДБ') {
    y.teamBox.pdb[3] = 'Оны шилдэг ажилтан';
  }
}

function updateTeamBoxField(year, field, val) {
  ensureTeamBoxData(year);
  db.years[year].teamBox[field] = val;
  autosave(false);
}

function updateTeamBoxPdb(year, idx, val) {
  ensureTeamBoxData(year);
  db.years[year].teamBox.pdb[idx] = val;
  autosave(false);
}

function updateTeamBoxRole(year, idx, val) {
  ensureTeamBoxData(year);
  db.years[year].teamBox.roles[idx] = val;
  autosave(false);
}

function clearTeamImage(year, key) {
  ensureTeamBoxData(year);
  delete db.years[year].teamBox.images[key];
  renderMain();
  autosave(false);
  toast('Зураг устгагдлаа', 'success');
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('FILE_READ_FAILED'));
    reader.readAsDataURL(file);
  });
}

function validateImageOrientation(file, required) {
  return new Promise((resolve) => {
    const img = new Image();
    const tempUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(tempUrl);
      resolve(required === 'landscape' ? img.width > img.height : img.height >= img.width);
    };
    img.onerror = () => { URL.revokeObjectURL(tempUrl); resolve(false); };
    img.src = tempUrl;
  });
}

function saveTeamImage(year, key, input, required) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    input.value = '';
    return toast('Зөвхөн зураг файл оруулна уу', 'error');
  }

  validateImageOrientation(file, required).then((isValid) => {
    if (!isValid) {
      input.value = '';
      if (required === 'landscape') {
        return toast('Энэ хэсэгт зөвхөн хэвтээ зураг оруулна уу', 'error');
      }
      return toast('Энэ хэсэгт зөвхөн босоо зураг оруулна уу', 'error');
    }

    const reader = new FileReader();
    reader.onload = () => {
      ensureTeamBoxData(year);
      db.years[year].teamBox.images[key] = reader.result;
      renderMain();
      autosave(false);
      toast('Зураг хадгалагдлаа ✓', 'success');
    };
    reader.onerror = () => toast('Зураг уншихад алдаа гарлаа', 'error');
    reader.readAsDataURL(file);
  });
}

function buildTeamImageControl(year, box, key, required) {

      </div>

function toggleEditInfo(year, field) {
  document.getElementById(`infoView_${year}_${field}`).style.display = 'none';
  document.getElementById(`infoEdit_${year}_${field}`).style.display = 'block';
}
function cancelEditInfo(year, field) {
  document.getElementById(`infoView_${year}_${field}`).style.display = 'block';
  document.getElementById(`infoEdit_${year}_${field}`).style.display = 'none';
  document.getElementById(`infoTA_${year}_${field}`).value = db.years[year][field];
}
function saveInfo(year, field) {
  const val = document.getElementById(`infoTA_${year}_${field}`).value.trim();
  if (!val) return toast('Хоосон байж болохгүй', 'error');
  db.years[year][field] = val;
  document.getElementById(`infoView_${year}_${field}`).innerHTML = `<p style="font-size:0.88rem;color:#374151;line-height:1.7">${val}</p>`;
  cancelEditInfo(year, field);
  autosave(false);
  toast('Хадгалагдлаа ✓', 'success');
}

}

      <div class="gallery-img-wrap" onclick="openImgModal('${p.url}','${p.title}','${p.desc}')">
        <img src="${p.url}" alt="${p.title}" onerror="this.src='https://images.unsplash.com/photo-1601134467661-3d775b999c0b?w=500&q=60'">
        <div class="gallery-badge">${year}</div>
      </div>
      <div class="gallery-body">
        <h4>${p.title}</h4>
        <p>${p.desc}</p>
        <div class="gallery-meta">
          <span class="gallery-year-tag">${year} он</span>
          <div class="gallery-actions">
            <button class="btn btn-sm btn-danger" onclick="deletePhoto(${year},'${p.id}')"><i class="fa-solid fa-trash-can"></i></button>
          </div>
        </div>
      </div>
    </div>
  `).join('')}</div>`;
}

function buildVideoGrid(year, videos) {
  if (!videos.length) return `<div class="empty-state" style="margin-bottom:32px"><i class="fa-regular fa-circle-play"></i><p>Видео бичлэг байхгүй байна.</p></div>`;
  return `<div class="video-grid">${videos.map(v => `
    <div class="video-card">
      <div class="video-wrap">
        ${getVideoEmbed(v.url)}
      </div>
      <div class="video-body">
        <h4>${v.title}</h4>
        <p>${v.desc}</p>
      </div>
      <div class="video-footer">
        <span class="gallery-year-tag">${year} он</span>
        <button class="btn btn-sm btn-danger" onclick="deleteVideo(${year},'${v.id}')"><i class="fa-solid fa-trash-can"></i></button>
      </div>
    </div>
  `).join('')}</div>`;
}

function getVideoEmbed(url) {
  // YouTube
  const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{11})/);
  if (ytMatch) return `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allowfullscreen></iframe>`;
  // Local upload (blob/data URL)
  if (url.startsWith('blob:') || url.startsWith('data:video/')) {
    return `<video controls><source src="${url}"></video>`;
  }
  // MP4
  if (url.endsWith('.mp4') || url.includes('.mp4')) return `<video controls><source src="${url}" type="video/mp4"></video>`;
  return `<iframe src="${url}" allowfullscreen></iframe>`;
}

// ── ADD YEAR ──
function openAddYearModal() { document.getElementById('addYearModal').classList.add('open'); }
function closeYearModal(e) {
  if (e && e.type === 'click' && e.target !== document.getElementById('addYearModal') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('addYearModal').classList.remove('open');
}
function addYear() {
  const y = parseInt(document.getElementById('newYearInput').value);
  const manager = document.getElementById('newManagerInput').value.trim();
  const staff = parseInt(document.getElementById('newStaffInput').value) || 0;
  const geo = document.getElementById('newGeoInput').value.trim();
  const history = document.getElementById('newHistoryInput').value.trim();
  if (!y || y < 1990) return toast('Жилийн утга буруу байна', 'error');
  if (db.years[y]) return toast(`${y} он аль хэдийн байна`, 'error');
  db.years[y] = { manager: manager || '—', staff, geo: geo || '—', history: history || '—', photos: [], videos: [], records: [] };
  activeYear = y;
  render();
  closeYearModal();
  autosave(false);
  toast(`${y} он амжилттай нэмэгдлээ`, 'success');
  // Clear inputs
  ['newYearInput','newManagerInput','newStaffInput','newGeoInput','newHistoryInput'].forEach(id => document.getElementById(id).value = '');
}

// ── DELETE YEAR ──
function deleteYear(year) {
  if (!confirm(`${year} оныг устгах уу? Бүх мэдээлэл устна.`)) return;
  delete db.years[year];
  activeYear = 'all';
  render();
  autosave(false);
  toast(`${year} он устгагдлаа`, 'success');
}

// ── RECORDS ──
function openAddRecord(year) { document.getElementById(`addRecordForm_${year}`).style.display = 'block'; }
function closeAddRecord(year) { document.getElementById(`addRecordForm_${year}`).style.display = 'none'; }
function saveRecord(year) {
  const name = document.getElementById(`rName_${year}`).value.trim();
  const value = document.getElementById(`rValue_${year}`).value.trim();
  const unit = document.getElementById(`rUnit_${year}`).value.trim();
  if (!name || !value) return toast('Нэр болон утга шаардлагатай', 'error');
  const id = 'r' + Date.now();
  db.years[year].records.push({ id, name, value, unit });
  document.getElementById(`recordsWrap_${year}`).innerHTML = buildRecordsTable(year, db.years[year].records);
  closeAddRecord(year);
  autosave(false);
  toast('Үзүүлэлт нэмэгдлээ ✓', 'success');
  [`rName_${year}`,`rValue_${year}`,`rUnit_${year}`].forEach(id => document.getElementById(id).value = '');
}
function updateRecord(year, id, field, val) {
  const rec = db.years[year].records.find(r => r.id === id);
  if (rec) { rec[field] = val; autosave(false); toast('Хадгалагдлаа ✓', 'success'); }
}
function deleteRecord(year, id) {
  db.years[year].records = db.years[year].records.filter(r => r.id !== id);
  document.getElementById(`recordsWrap_${year}`).innerHTML = buildRecordsTable(year, db.years[year].records);
  autosave(false);
  toast('Устгагдлаа', 'success');
}

// ── PHOTOS ──
function openAddPhoto(year) { document.getElementById(`addPhotoForm_${year}`).style.display = 'block'; }
function closeAddPhoto(year) { document.getElementById(`addPhotoForm_${year}`).style.display = 'none'; }
async function savePhoto(year) {
  const title = document.getElementById(`pTitle_${year}`).value.trim();
  const fileInput = document.getElementById(`pFile_${year}`);
  const file = fileInput.files && fileInput.files[0];
  const desc = document.getElementById(`pDesc_${year}`).value.trim();
  if (!file) return toast('Зураг сонгоно уу', 'error');
  if (!file.type.startsWith('image/')) return toast('Зөвхөн зураг файл оруулна уу', 'error');
  const displayTitle = title || file.name;
  let url = '';
  try {
    url = await fileToDataUrl(file);
  } catch(e) {
    return toast('Зураг уншихад алдаа гарлаа', 'error');
  }
  const id = 'p' + Date.now();
  db.years[year].photos.push({ id, title: displayTitle, url, desc: desc || '' });
  document.getElementById(`galleryWrap_${year}`).innerHTML = buildGallery(year, db.years[year].photos);
  closeAddPhoto(year);
  autosave(false);
  toast('Зураг нэмэгдлээ ✓', 'success');
  [`pTitle_${year}`,`pDesc_${year}`].forEach(id => document.getElementById(id).value = '');
  fileInput.value = '';
}
function deletePhoto(year, id) {
  const target = db.years[year].photos.find(p => p.id === id);
  if (target && typeof target.url === 'string' && target.url.startsWith('blob:')) {
    URL.revokeObjectURL(target.url);
  }
  db.years[year].photos = db.years[year].photos.filter(p => p.id !== id);
  document.getElementById(`galleryWrap_${year}`).innerHTML = buildGallery(year, db.years[year].photos);
  autosave(false);
  toast('Зураг устгагдлаа', 'success');
}

// ── VIDEOS ──
function openAddVideo(year) { document.getElementById(`addVideoForm_${year}`).style.display = 'block'; }
function closeAddVideo(year) { document.getElementById(`addVideoForm_${year}`).style.display = 'none'; }
async function saveVideo(year) {
  const title = document.getElementById(`vTitle_${year}`).value.trim();
  const fileInput = document.getElementById(`vFile_${year}`);
  const file = fileInput.files && fileInput.files[0];
  const desc = document.getElementById(`vDesc_${year}`).value.trim();
  if (!file) return toast('Видео файл сонгоно уу', 'error');
  if (!file.type.startsWith('video/')) return toast('Зөвхөн видео файл оруулна уу', 'error');
  const displayTitle = title || file.name;
  let url = '';
  try {
    url = await fileToDataUrl(file);
  } catch(e) {
    return toast('Видео уншихад алдаа гарлаа', 'error');
  }
  const id = 'v' + Date.now();
  db.years[year].videos.push({ id, title: displayTitle, url, desc: desc || '' });
  document.getElementById(`videoWrap_${year}`).innerHTML = buildVideoGrid(year, db.years[year].videos);
  closeAddVideo(year);
  autosave(false);
  toast('Видео нэмэгдлээ ✓', 'success');
  [`vTitle_${year}`,`vDesc_${year}`].forEach(id => document.getElementById(id).value = '');
  fileInput.value = '';
}
function deleteVideo(year, id) {
  const target = db.years[year].videos.find(v => v.id === id);
  if (target && typeof target.url === 'string' && target.url.startsWith('blob:')) {
    URL.revokeObjectURL(target.url);
  }
  db.years[year].videos = db.years[year].videos.filter(v => v.id !== id);
  document.getElementById(`videoWrap_${year}`).innerHTML = buildVideoGrid(year, db.years[year].videos);
  autosave(false);
  toast('Видео устгагдлаа', 'success');
}

// ── IMAGE MODAL ──
function openImgModal(url, title, desc) {
  document.getElementById('modalImg').src = url;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('imgModal').classList.add('open');
}
function closeImgModal(e) {
  if (e && e.target !== document.getElementById('imgModal') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('imgModal').classList.remove('open');
  document.getElementById('modalImg').src = '';
}

// ── TOAST ──
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

// ── INIT ──
loadSaved();
render();
</script>
